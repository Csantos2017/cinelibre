async function _tmStep2(dir, vid, vnom){
  /* Cargar productos disponibles según dirección */
  var prods=[];
  if(dir==='to'){
    /* Bodega central → vendedor: productos con stock en bodega */
    prods=cache.prods.filter(function(p){return Number(p.stock||0)>0;});
  } else {
    /* Vendedor → bodega central: productos en bodega del vendedor */
    var bvR=await db.from('bodega_vendedor')
      .select('stock,productos(id,nombre,unidades_por_caja,precio_venta,precio_caja)')
      .eq('empresa_id',S.empresa_id).eq('vendedor_id',vid);
    prods=(bvR.data||[]).filter(function(b){return Number(b.stock||0)>0;}).map(function(b){
      return{
        id:b.productos&&b.productos.id,
        nombre:b.productos&&b.productos.nombre||'?',
        unidades_por_caja:b.productos&&b.productos.unidades_por_caja||1,
        precio_venta:b.productos&&b.productos.precio_venta||0,
        precio_caja:b.productos&&b.productos.precio_caja||0,
        stock:b.stock
      };
    }).filter(function(p){return p.id;});
  }

  if(!prods.length){toast('Sin productos disponibles para transferir','warn');return;}

  var inpS='width:52px;background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--cyan);font-size:14px;font-weight:700;font-family:var(--mono);text-align:center;padding:4px;outline:none';

  modal((dir==='to'?'📤':'📥')+' Transferencia masiva → '+esc(vnom),
    '<div style="font-size:12px;color:var(--txt3);margin-bottom:8px">Ingresa las cantidades a transferir. Deja en 0 los que no quieres mover.</div>'+
    '<div class="sbox" style="margin-bottom:8px"><span>🔍</span><input id="tmSearch" placeholder="Buscar producto…" autocomplete="off" style="font-size:13px"/></div>'+
    '<div id="tmTable" style="max-height:50vh;overflow-y:auto">'+
    '<table style="width:100%;border-collapse:collapse">'+
      '<thead><tr>'+
        '<th style="text-align:left;padding:6px 4px;font-size:11px;color:var(--txt3);border-bottom:1px solid var(--border)">Producto</th>'+
        '<th style="text-align:center;padding:6px 4px;font-size:11px;color:var(--txt3);border-bottom:1px solid var(--border)">Stock</th>'+
        '<th style="text-align:center;padding:6px 4px;font-size:11px;color:var(--txt3);border-bottom:1px solid var(--border)">Cj</th>'+
        '<th style="text-align:center;padding:6px 4px;font-size:11px;color:var(--txt3);border-bottom:1px solid var(--border)">Ud</th>'+
      '</tr></thead>'+
      '<tbody>'+
      prods.map(function(p,i){
        var upc=Math.max(1,Number(p.unidades_por_caja||1));
        var b=toBoxes(Number(p.stock||0),upc);
        var stLbl=upc>1?(b.cajas+'cj'+(b.sueltas>0?' '+b.sueltas+'u':'')):p.stock+'u';
        return'<tr style="border-bottom:1px solid var(--border)">'+
          '<td style="padding:8px 4px;font-size:12px;font-weight:600">'+esc(p.nombre)+'</td>'+
          '<td style="text-align:center;font-size:11px;color:var(--txt3);padding:8px 4px">'+stLbl+'</td>'+
          '<td style="padding:6px 4px;text-align:center"><input type="number" id="tm_cj_'+i+'" min="0" value="0" style="'+inpS+'" onfocus="this.select()"/></td>'+
          '<td style="padding:6px 4px;text-align:center"><input type="number" id="tm_ud_'+i+'" min="0" value="0" style="'+inpS+'" onfocus="this.select()"/></td>'+
        '</tr>';
      }).join('')+
      '</tbody></table></div>',
    '<button class="btn ghost sm" id="tm2C">Cancelar</button>'+
    '<button class="btn g sm" id="tm2Ok">✓ Transferir todo</button>');

  document.getElementById('tm2C').onclick=closeModal;

  /* Wire search */
  var _tmProds=prods;
  document.getElementById('tmSearch').oninput=function(){
    var q=this.value.toLowerCase().trim();
    var tbl=document.getElementById('tmTable');
    if(!tbl)return;
    var rows=tbl.querySelectorAll('tbody tr');
    rows.forEach(function(row){
      var nm=row.querySelector('td');
      if(!nm)return;
      row.style.display=(!q||nm.textContent.toLowerCase().indexOf(q)>=0)?'':'none';
    });
  };

  document.getElementById('tm2Ok').onclick=async function(){
    /* Recoger cantidades */
    var items=[];
    for(var i=0;i<prods.length;i++){
      var cjEl=document.getElementById('tm_cj_'+i);
      var udEl=document.getElementById('tm_ud_'+i);
      var cj=parseInt(cjEl&&cjEl.value)||0;
      var ud=parseInt(udEl&&udEl.value)||0;
      if(cj===0&&ud===0) continue; /* saltar sin cantidad */
      var p=prods[i];
      var upc=Math.max(1,Number(p.unidades_por_caja||1));
      var total=cj*upc+ud;
      if(total>Number(p.stock||0)){
        toast('Stock insuficiente: '+esc(p.nombre)+' (disponible: '+p.stock+')','err');
        return;
      }
      items.push({p:p,cj:cj,ud:ud,total:total,upc:upc});
    }
    if(!items.length){toast('Ingresa al menos una cantidad','warn');return;}

    var btn=document.getElementById('tm2Ok');
    if(btn){btn.disabled=true;btn.textContent='Transfiriendo…';}

    var empR=await db.from('empresas').select('nombre,logo').eq('id',S.empresa_id).maybeSingle();
    var empD=empR.data||{nombre:S.empresa_nombre||''};

    /* Procesar cada item */
    for(var j=0;j<items.length;j++){
      var it=items[j];
      var pid=it.p.id;

      if(dir==='to'){
        /* Bajar de bodega central */
        var newStock=Math.max(0,Number(it.p.stock||0)-it.total);
        await db.from('productos').update({stock:newStock}).eq('id',pid);
        /* Subir a bodega vendedor */
        var bvEx=await db.from('bodega_vendedor').select('id,stock').eq('producto_id',pid).eq('vendedor_id',vid).maybeSingle();
        if(bvEx.data){
          await db.from('bodega_vendedor').update({stock:Number(bvEx.data.stock||0)+it.total}).eq('id',bvEx.data.id);
        } else {
          await db.from('bodega_vendedor').insert([{producto_id:pid,vendedor_id:vid,empresa_id:S.empresa_id,stock:it.total}]);
        }
      } else {
        /* Bajar de bodega vendedor */
        var bvEx2=await db.from('bodega_vendedor').select('id,stock').eq('producto_id',pid).eq('vendedor_id',vid).maybeSingle();
        if(bvEx2.data){
          var newBv=Math.max(0,Number(bvEx2.data.stock||0)-it.total);
          await db.from('bodega_vendedor').update({stock:newBv}).eq('id',bvEx2.data.id);
        }
        /* Subir a bodega central */
        var pCur=cache.prods.find(function(x){return x.id===pid;});
        var curSt=pCur?Number(pCur.stock||0):0;
        await db.from('productos').update({stock:curSt+it.total}).eq('id',pid);
      }

      /* Registrar en historial */
      var note=dir==='to'?'Transferencia masiva → '+vnom:'Transferencia masiva ← '+vnom;
      await db.from('ajustes_inventario').insert([{
        empresa_id:S.empresa_id,admin_id:S.id,vendedor_id:vid,
        producto_id:pid,producto_nom:it.p.nombre,
        stock_sistema:it.p.stock,stock_fisico:Number(it.p.stock||0)-it.total,
        diferencia:it.total,motivo:note
      }]).catch(function(){});
    }

    /* Generar comprobante */
    var now=new Date().toLocaleString('es',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var logoH=empD.logo?'<img src="'+empD.logo+'" style="max-height:50px;max-width:120px;object-fit:contain;display:block;margin-bottom:6px"/>':'';
    var repHTML='<!DOCTYPE html><html><head><title>Transferencia Masiva</title>'+
      '<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:13px;padding:24px;color:#111}'+
      'h2{font-size:18px;color:#0f172a;margin-bottom:4px}'+
      '.sub{font-size:12px;color:#64748b;margin-bottom:16px}'+
      'table{width:100%;border-collapse:collapse;margin-top:16px}'+
      'th{background:#0f172a;color:#fff;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase}'+
      'td{padding:8px 10px;border-bottom:1px solid #e2e8f0;font-size:13px}'+
      '.tot{font-weight:700;font-size:14px;margin-top:16px;text-align:right}'+
      '@media print{body{padding:10px}}</style>'+
      '</head><body>'+
      logoH+
      '<h2>'+esc(empD.nombre)+'</h2>'+
      '<div class="sub">'+(dir==='to'?'Transferencia Bodega Central → '+esc(vnom):'Devolución '+esc(vnom)+' → Bodega Central')+'</div>'+
      '<div class="sub">Fecha: '+now+' | Autorizado por: '+esc(S.nombre||S.username)+'</div>'+
      '<table><thead><tr><th>Producto</th><th>Cajas</th><th>Unidades</th><th>Total uds</th></tr></thead><tbody>'+
      items.map(function(it){
        return'<tr><td>'+esc(it.p.nombre)+'</td><td>'+it.cj+'</td><td>'+it.ud+'</td><td>'+it.total+'</td></tr>';
      }).join('')+
      '</tbody></table>'+
      '<div class="tot">'+items.length+' producto(s) transferido(s)</div>'+
      '</body></html>';

    closeModal();
    toast('✓ Transferencia masiva completada — '+items.length+' producto(s)','ok');
    await loadProds();
    pintarInv(cache.prods,'');
    bcPrint(repHTML);
  };
}

async function transferir(pid){
  var prod=cache.prods.find(function(p){return p.id===pid;});if(!prod)return;
  var upc=Number(prod.unidades_por_caja||1);

  /* Cargar vendedores (vendedor + v_inv) con su stock actual de este producto */
  var vdr=await db.from('usuarios').select('id,nombre,username').eq('empresa_id',S.empresa_id).in('role',['vendedor','v_inv']);
  var vds=vdr.data||[];
  if(!vds.length){toast('No hay vendedores creados','warn');return;}

  /* Leer stock de vendedores para este producto */
  var bvR=await db.from('bodega_vendedor').select('id,stock,vendedor_id').eq('producto_id',pid).eq('empresa_id',S.empresa_id);
  var bvMap={};
  (bvR.data||[]).forEach(function(b){bvMap[b.vendedor_id]={id:b.id,stock:Number(b.stock||0)};});

  function stockLabel(units){
    if(upc<=1) return units+'u';
    var cj=Math.floor(units/upc), ud=units%upc;
    return (cj>0?cj+'cj':'')+' '+(ud>0?ud+'u':'');
  }

  var centCj=Math.floor(prod.stock/upc);
  var centUd=prod.stock%upc;

  var vendOpts=vds.map(function(v){
    var bv=bvMap[v.id];
    var stLbl=bv?(' — bodega: '+stockLabel(bv.stock).trim()):'';
    return '<option value="'+v.id+'">'+esc(v.nombre||v.username)+stLbl+'</option>';
  }).join('');

  modal('📦 Transferencia: '+esc(prod.nombre),
    /* Dirección */
    '<div style="display:flex;gap:6px;margin-bottom:14px" id="trDirWrap">'+
      '<button class="btn b sm" id="trDirOut" style="flex:1;font-size:12px">📤 Bodega → Vendedor</button>'+
      '<button class="btn sl sm" id="trDirIn"  style="flex:1;font-size:12px">📥 Vendedor → Bodega</button>'+
    '</div>'+
    /* Stock disponible */
    '<div id="trStockInfo" style="background:var(--s3);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span style="color:var(--txt3)">Bodega central:</span>'+
        '<span style="font-family:var(--mono);font-weight:700;color:var(--cyan)">'+
          (upc>1?(centCj+'cj '+(centUd>0?centUd+'u':'')):(prod.stock+'u'))+
        '</span>'+
      '</div>'+
    '</div>'+
    /* Vendedor */
    '<div class="fld"><label>Vendedor *</label>'+
      '<select id="trVend"><option value="">Seleccionar…</option>'+vendOpts+'</select>'+
    '</div>'+
    /* Cantidad en cajas + unidades */
    '<div style="margin-bottom:4px;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px">Cantidad a transferir</div>'+
    (upc>1?
      '<div class="g2" style="margin-bottom:8px">'+
        '<div class="fld"><label>Cajas</label><input id="trCj" type="number" min="0" value="0" placeholder="0"/></div>'+
        '<div class="fld"><label>Unidades sueltas</label><input id="trUd" type="number" min="0" value="0" placeholder="0"/></div>'+
      '</div>'
    :
      '<div class="fld"><input id="trUd" type="number" min="0" value="1" placeholder="0"/><input type="hidden" id="trCj" value="0"/></div>'
    )+
    '<div id="trResumen" style="font-size:12px;color:var(--cyan);font-family:var(--mono);font-weight:700;min-height:18px"></div>',
    '<button class="btn ghost sm" id="trC">Cancelar</button>'+
    '<button class="btn b sm" id="trOk">📤 Transferir</button>');

  g('trC').onclick=closeModal;

  /* Estado de dirección */
  var _dirOut=true; /* true=bodega→vend, false=vend→bodega */

  function _updateDir(){
    var btnOut=g('trDirOut'),btnIn=g('trDirIn'),btnOk=g('trOk');
    if(_dirOut){
      btnOut.style.opacity='1'; btnOut.style.fontWeight='800';
      btnIn.style.opacity='.5'; btnIn.style.fontWeight='400';
      if(btnOk){btnOk.className='btn b sm';btnOk.textContent='📤 Transferir a vendedor';}
    } else {
      btnIn.style.opacity='1'; btnIn.style.fontWeight='800';
      btnOut.style.opacity='.5'; btnOut.style.fontWeight='400';
      if(btnOk){btnOk.className='btn sl sm';btnOk.textContent='📥 Devolver a bodega';}
    }
    /* Actualizar info de stock según dirección y vendedor seleccionado */
    _updateStockInfo();
  }

  function _updateStockInfo(){
    var vid=g('trVend')&&g('trVend').value;
    var info=g('trStockInfo'); if(!info)return;
    var bv=vid?bvMap[vid]:null;
    var vStLbl=bv?stockLabel(bv.stock).trim():'0u';
    info.innerHTML=
      '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
        '<span style="color:var(--txt3)">Bodega central:</span>'+
        '<span style="font-family:var(--mono);font-weight:700;color:var(--cyan)">'+
          (upc>1?(centCj+'cj '+(centUd>0?centUd+'u':'')):prod.stock+'u')+
        '</span>'+
      '</div>'+
      (vid?
        '<div style="display:flex;justify-content:space-between">'+
          '<span style="color:var(--txt3)">Bodega vendedor:</span>'+
          '<span style="font-family:var(--mono);font-weight:700;color:var(--amber)">'+vStLbl+'</span>'+
        '</div>'
      :'');
  }

  function _updateResumen(){
    var cj=parseInt(g('trCj')&&g('trCj').value)||0;
    var ud=parseInt(g('trUd')&&g('trUd').value)||0;
    var total=cj*upc+ud;
    var r=g('trResumen');
    if(r) r.textContent=total>0?('Total: '+total+' uds'+(upc>1?' ('+stockLabel(total).trim()+')':'')):'';
  }

  g('trDirOut').onclick=function(){_dirOut=true;_updateDir();};
  g('trDirIn').onclick=function(){_dirOut=false;_updateDir();};
  g('trVend').onchange=_updateStockInfo;
  if(g('trCj'))g('trCj').oninput=_updateResumen;
  if(g('trUd'))g('trUd').oninput=_updateResumen;
  _updateDir();

  g('trOk').onclick=async function(){
    var vid=g('trVend').value;
    var cj=Math.max(0,parseInt(g('trCj')&&g('trCj').value)||0);
    var ud=Math.max(0,parseInt(g('trUd')&&g('trUd').value)||0);
    var qty=cj*upc+ud; /* total en unidades */

    if(!vid){toast('Selecciona un vendedor','err');return;}
    if(qty<=0){toast('Ingresa al menos 1 caja o 1 unidad','err');return;}

    var vd=vds.find(function(v){return v.id===vid;});
    var vnom=(vd&&(vd.nombre||vd.username))||'Vendedor';

    if(_dirOut){
      /* ── BODEGA → VENDEDOR ── */
      var freshR=await db.from('productos').select('stock').eq('id',pid).maybeSingle();
      if(freshR.error||!freshR.data){toast('Error al verificar stock','err');return;}
      var stockCentral=Number(freshR.data.stock||0);

      if(qty>stockCentral){
        var disp=upc>1?stockLabel(stockCentral).trim():stockCentral+'u';
        toast('Stock insuficiente en bodega — disponible: '+disp,'err');return;
      }

      var r1=await db.from('productos').update({stock:Math.max(0,stockCentral-qty)}).eq('id',pid);
      if(r1.error){toast('Error: '+r1.error.message,'err');return;}

      var bv=bvMap[vid];
      if(bv){
        await db.from('bodega_vendedor').update({stock:Math.max(0,bv.stock+qty)}).eq('id',bv.id);
      } else {
        await db.from('bodega_vendedor').insert([{producto_id:pid,vendedor_id:vid,empresa_id:S.empresa_id,stock:qty}]);
      }
      await db.from('transferencias').insert([{
        producto_id:pid,producto_nom:prod.nombre,
        vendedor_id:vid,vendedor_nom:vnom,
        admin_id:S.id,empresa_id:S.empresa_id,cantidad:qty
      }]);
      toast('✓ '+stockLabel(qty).trim()+' transferidas a '+vnom,'ok');
      _printTransferencia({
        tipo:'salida', prod:prod, qty:qty, upc:upc,
        cj:cj, ud:ud, vnom:vnom, admin:S.nombre||'Administrador',
        empNom:S.empresa_nombre||'Bridge Control', fecha:new Date()
      });

    } else {
      /* ── VENDEDOR → BODEGA (devolución) ── */
      var bvFresh=await db.from('bodega_vendedor').select('id,stock').eq('producto_id',pid).eq('vendedor_id',vid).maybeSingle();
      if(bvFresh.error||!bvFresh.data){toast('El vendedor no tiene este producto en bodega','err');return;}
      var stockVend=Number(bvFresh.data.stock||0);

      if(qty>stockVend){
        var dispV=upc>1?stockLabel(stockVend).trim():stockVend+'u';
        toast('Stock insuficiente en bodega del vendedor — disponible: '+dispV,'err');return;
      }

      var r2=await db.from('bodega_vendedor').update({stock:Math.max(0,stockVend-qty)}).eq('id',bvFresh.data.id);
      if(r2.error){toast('Error: '+r2.error.message,'err');return;}

      /* Sumar a bodega central */
      var freshC=await db.from('productos').select('stock').eq('id',pid).maybeSingle();
      var stockC=freshC.data?Number(freshC.data.stock||0):prod.stock;
      await db.from('productos').update({stock:stockC+qty}).eq('id',pid);

      await db.from('transferencias').insert([{
        producto_id:pid,producto_nom:prod.nombre,
        vendedor_id:vid,vendedor_nom:vnom,
        admin_id:S.id,empresa_id:S.empresa_id,cantidad:-qty
      }]);
      toast('✓ '+stockLabel(qty).trim()+' devueltas a bodega central desde '+vnom,'ok');
      _printTransferencia({
        tipo:'devolucion', prod:prod, qty:qty, upc:upc,
        cj:cj, ud:ud, vnom:vnom, admin:S.nombre||'Administrador',
        empNom:S.empresa_nombre||'Bridge Control', fecha:new Date()
      });
    }

    closeModal();
    await loadProds();pintarInv(cache.prods,'');
  };
}

/* ══ POS ══ */
function drawPOS(ps,cs,q,cid,isVend,catFilter){
  var src=isVend?cache.bv:ps;

        /* Si UPC>1 sumar 1 caja; si no, 1 unidad */
        if(ex.upc>1){ ex.cj=(ex.cj||0)+1; }
        else { ex.ud=(ex.ud||0)+1; }
        var totalU=ex.cj*ex.upc+ex.ud;
        if(totalU>ex.maxSt){
          if(ex.upc>1) ex.cj=Math.max(0,ex.cj-1);
          else ex.ud=Math.max(0,ex.ud-1);
          toast('Stock máximo alcanzado','warn');return;
        }
        ex.maxSt=st;
      } else {
        if(st<=0){toast('Sin stock','warn');return;}
        /* New item — start with 0 cj, 1 ud */
        var _vDefCj=_upc>1?1:0,_vDefUd=_upc>1?0:1;
        cart.push({id:id,nombre:addNom,
          pUnit:_pUnit,pCaja:_pCaja,upc:_upc,
          cj:_vDefCj,ud:_vDefUd,
          maxSt:st,isVend:isVend});
      }
      /* Update FAB instantly — no full re-render */
      _updateCartFab();
      /* Flash the FAB */
      var _fab=g('cartFab');
      if(_fab){_fab.style.transform='scale(1.1)';setTimeout(function(){if(g('cartFab'))g('cartFab').style.transform='';},150);}
    };
  });

  /* Wire: limpiar carrito */
  var clrBtn=g('clrCart');
  if(clrBtn)clrBtn.onclick=function(){cart=[];renderPOS(g('posQ').value||'');};

  /* Wire: qty inputs con teclado */
  function wireCartInput(inp){
    inp.oninput=function(){
      var i=parseInt(inp.dataset.ci);
      if(isNaN(i)||!cart[i])return;
      var ci=cart[i];
      var upc=ci.upc>0?ci.upc:1;
      var cj=Math.max(0,parseInt(g('qc_'+i)&&g('qc_'+i).value)||0);
      var ud=Math.max(0,parseInt(g('qu_'+i)&&g('qu_'+i).value)||0);
      var totalUnits=cj*upc+ud;
      if(totalUnits>ci.maxSt){
        toast('Stock máximo: '+boxLabel(ci.maxSt,upc),'warn');
        cj=ci.cj; ud=ci.ud;
        if(g('qc_'+i))g('qc_'+i).value=cj;
        if(g('qu_'+i))g('qu_'+i).value=ud;
        return;
      }
      ci.cj=cj; ci.ud=ud;
      var lineTotal=cj*ci.pCaja + ud*ci.pUnit;
      var cpx=g('cpx_'+i);
      if(cpx)cpx.textContent=fm(lineTotal);
      var sub=inp.closest('.ci');
      if(sub){
        var d=sub.querySelectorAll('div[style*="font-size:10px"]');
        if(d[0]){
          var parts=[];
          if(cj>0)parts.push(cj+'cj × '+fm(ci.pCaja));
          if(ud>0)parts.push(ud+'u × '+fm(ci.pUnit));
          d[0].textContent=parts.length?parts.join(' + '):'—';
        }
      }
      recalcCartTotals();
    };
    inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();};
  }
  document.querySelectorAll('.qty-cj,.qty-ud').forEach(wireCartInput);

  function recalcCartTotals(){
    var sub=cart.reduce(function(s,c){
      return s + (c.cj||0)*c.pCaja + (c.ud||0)*c.pUnit;
    },0);
    var disc=0;var discEl=g('discInp');if(discEl)disc=parseFloat(discEl.value)||0;
    var dtype=g('discType');if(dtype&&dtype.value==='%')disc=sub*disc/100;
    var tot=Math.max(0,sub-disc);
    /* Update all total display elements */
    var sl=g('subLine');if(sl)sl.textContent=fm(sub);
    var tl=g('totalLine');if(tl)tl.textContent=fm(tot);
    var dl=g('discLine');
    if(dl){
      if(disc>0){dl.style.display='flex';var da=g('discAmt');if(da)da.textContent='-'+fm(disc);}
      else dl.style.display='none';
    }
    var cb=g('btnCobrar');if(cb)cb.textContent='✓ Confirmar venta · '+fm(tot);
    calcDisc();
  }

  /* Wire: +/- buttons */
  document.querySelectorAll('[data-qm]').forEach(function(b){
    b.onclick=function(){
      var i=parseInt(b.dataset.qm);
      if(cart[i].cantidad<=1){cart.splice(i,1);}else{cart[i].cantidad--;}
      renderPOS(g('posQ').value||'');
    };
  });
  document.querySelectorAll('[data-qp]').forEach(function(b){
    b.onclick=function(){
      var i=parseInt(b.dataset.qp);
      if(cart[i].cantidad>=cart[i].maxSt){toast('Stock máximo: '+cart[i].maxSt,'warn');return;}
      cart[i].cantidad++;
      renderPOS(g('posQ').value||'');
    };
  });
  document.querySelectorAll('[data-qd]').forEach(function(b){
    b.onclick=function(){cart.splice(parseInt(b.dataset.qd),1);renderPOS(g('posQ').value||'');};
  });

  /* Wire: discount live calc */
  function calcDisc(){
    var sub=cart.reduce(function(s,c){return s+(c.cj||0)*c.pCaja+(c.ud||0)*c.pUnit;},0);
    var dv=parseFloat(g('discVal')&&g('discVal').value)||0;
    var dt=g('discType')&&g('discType').value||'fixed';
    var disc=dt==='pct'?Math.min(sub,sub*(dv/100)):Math.min(sub,dv);
    var tot=Math.max(0,sub-disc);
    var sl=g('subLine'),dl=g('discLine'),da=g('discAmt'),tl=g('totalLine'),cb=g('btnCobrar');
    if(sl)sl.textContent=fm(sub);
    if(dl)dl.style.display=disc>0?'flex':'none';
    if(da)da.textContent='- '+fm(disc);
    if(tl)tl.textContent=fm(tot);
    if(cb)cb.textContent='✓ Confirmar venta · '+fm(tot);
    return{sub:sub,disc:disc,tot:tot,dtype:dt,dval:dv};
  }
  var dvi=g('discVal'),dti=g('discType');
  if(dvi)dvi.oninput=calcDisc;
  if(dti)dti.onchange=calcDisc;

  /* Wire: cobrar */
  var cobBtn=g('btnCobrar');
  if(cobBtn)cobBtn.onclick=function(){ var discInfo=calcDisc(); closeCart&&closeCart(); checkout(isVend,discInfo); };

  /* Wire: cliente — clSel es hidden input, _cid se actualiza al seleccionar */
  window._cid=cid||'';
  if(g('clSel'))g('clSel').oninput=function(){window._cid=this.value;};

  window._posVend=isVend; window._posCs=cs; window._posPs=ps;
}

function renderPOS(q){ window._posPage=1; renderPOSCat(q, window._posCat||'_all'); }
function renderPOSCat(q, cat){
  window._posPage=window._posPage||1;
  window._posCat=cat||'_all';

  /* Si el grid ya está en pantalla, actualizar SOLO el grid
     para no cerrar el teclado en móvil */
  var grid=g('posGrid');
  if(grid){
    var isVend=window._posVend||false;
    var src=isVend?cache.bv:(window._posPs||cache.prods);
    var fl=src.filter(function(p){
      var nom=isVend?(p.productos&&p.productos.nombre)||'':(p.nombre||'');
      var cat2=isVend?(p.productos&&p.productos.categoria)||'':(p.categoria||'');
      var st=Number(p.stock||0);
      var matchQ=!q||nom.toLowerCase().indexOf(q.toLowerCase())>=0;
      var matchCat=!(window._posCat)||window._posCat==='_all'||cat2===window._posCat;
      return matchQ&&matchCat&&st>0;
    });
    var PAGE_SIZE=60;
    var _page=window._posPage||1;
    var flPaged=fl.slice(0,_page*PAGE_SIZE);
    var hasMore=fl.length>flPaged.length;
    var cards=flPaged.map(function(p){
      var nom=isVend?(p.productos&&p.productos.nombre)||'?':(p.nombre||'?');
      var px=isVend?(p.productos&&p.productos.precio_venta)||0:(p.precio_venta||0);
      var st=Number(p.stock||0);
      var cat2=isVend?(p.productos&&p.productos.categoria)||'':(p.categoria||'');
      var img=isVend?(p.productos&&p.productos.imagen)||null:(p.imagen||null);
      var imgHtml=img
        ?'<div class="pc-img" data-imgurl="'+img+'" oncontextmenu="return false"><img src="'+img+'" style="width:100%;height:100%;object-fit:cover;pointer-events:none"/></div>'
        :'<div class="pc-img pc-img-ph"><span>📦</span></div>';
      var upcCard=isVend?(p.productos&&p.productos.unidades_por_caja)||1:(p.unidades_por_caja||1);
      var costoCard=isVend?(p.productos&&p.productos.costo)||0:(p.costo||0);
      var mgCard=isVend?(p.productos&&p.productos.margen)||0:(p.margen||0);
      var pca,pUnit;
      if(isVend){
        pUnit=(p.productos&&p.productos.precio_venta)||px||0;
        pca=(p.productos&&p.productos.precio_caja)||(pUnit*upcCard)||0;
        if(!pca)pca=pUnit*upcCard;
      } else {
        pca=costoCard>0?costoCard*(1+mgCard/100):(p.precio_caja||0);
        pUnit=upcCard>0&&pca>0?pca/upcCard:px;
        if(!pca)pca=pUnit*upcCard;
      }
      return '<div class="pc'+(st<=0?' sold-out':'')+'" data-pid="'+p.id+'" data-nom="'+esc(nom)+'" data-px="'+pUnit+'" data-pca="'+pca+'" data-upc="'+upcCard+'" data-st="'+st+'">'+ 
        imgHtml+
        '<div class="pc-body">'+
          '<div class="pc-nm">'+esc(nom)+'</div>'+
          (cat2?'<div class="pc-cat">'+esc(cat2)+'</div>':'')+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
            '<div style="display:flex;flex-direction:column">'+
              '<div class="pc-px">'+fm(pUnit)+'<span style="font-size:9px;font-weight:400;color:var(--txt3)"> /u</span></div>'+
              (upcCard>1?'<div style="font-size:10px;color:var(--txt3)">'+fm(pca)+'/cj</div>':'')+
            '</div>'+
            '<div class="pc-st">'+(st<=0?'<span style="color:var(--red)">Agotado</span>':(upcCard>1?boxLabel(st,upcCard):st+'u'))+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('')||'<div class="empty">Sin productos disponibles</div>';
    if(hasMore) cards+='<div style="grid-column:1/-1;text-align:center;padding:16px"><button id="posMore" class="btn sl sm" style="width:100%;max-width:300px">Ver más productos ('+(fl.length-flPaged.length)+' restantes)</button></div>';
    grid.innerHTML=cards;
    /* Re-wire card clicks */
    document.querySelectorAll('#posGrid .pc').forEach(function(card){
      if(card.classList.contains('sold-out'))return;
      card.onclick=function(){
        var id=card.dataset.pid,nom=card.dataset.nom;
        var px=parseFloat(card.dataset.px)||0,st=parseInt(card.dataset.st)||0;
        var upc4=parseInt(card.dataset.upc)||1;
        var pca4=parseFloat(card.dataset.pca)||0;
        if(!pca4||pca4<=px)pca4=px*upc4;
        var ex=cart.find(function(i){return i.id===id;});
        if(ex){
          if(ex.upc>1){ ex.cj=(ex.cj||0)+1; }
          else { ex.ud=(ex.ud||0)+1; }
          var totalU=ex.cj*ex.upc+ex.ud;
          if(totalU>ex.maxSt){
            if(ex.upc>1) ex.cj=Math.max(0,ex.cj-1);
            else ex.ud=Math.max(0,ex.ud-1);
            toast('Stock máximo alcanzado','warn');return;
          }
          ex.maxSt=st;}
        else{if(st<=0){toast('Sin stock','warn');return;}
          /* Si tiene UPC > 1, agregar 1 caja por defecto; si no, 1 unidad */
          var _defCj=upc4>1?1:0, _defUd=upc4>1?0:1;
          if(_defCj>st){_defCj=0;_defUd=1;} /* fallback si no hay stock de caja completa */
          cart.push({id:id,nombre:nom,pUnit:px,pCaja:pca4,upc:upc4,cj:_defCj,ud:_defUd,maxSt:st,isVend:isVend});}
        /* Update cart without rebuilding the whole page */
        var fab=g('cartFab');
        if(fab){fab.querySelector('.badge').textContent=cart.length;var sub=cart.reduce(function(s,c){return s+(c.cj||0)*c.pCaja+(c.ud||0)*c.pUnit;},0);fab.innerHTML='🛒 Carrito <span class="badge">'+cart.length+'</span>&nbsp;&nbsp;'+fm(sub);}
      };
    });
    /* Re-wire posMore */
    var mb=g('posMore');
    if(mb)mb.onclick=function(){window._posPage=(window._posPage||1)+1;renderPOSCat(q,window._posCat||'_all');};
    return; /* salir sin redibujar toda la página */
  }

  /* Primera carga — dibujar todo normalmente */
  var drawerWasOpen = g('cartDrawer') && g('cartDrawer').classList.contains('open');
  if(window._posVend)drawPOS([],window._posCs||[],q||'','',true,cat||'_all');
  else drawPOS(window._posPs||cache.prods,window._posCs||cache.clts,q||'','',false,cat||'_all');
  if(drawerWasOpen && g('cartDrawer') && cart.length>0){
    setTimeout(function(){ g('cartDrawer').classList.add('open'); if(g('cartOverlay'))g('cartOverlay').classList.add('open'); },10);
  }
}



/* ── GPS helper: retorna {lat,lng} o null si no disponible/denegado ── */
function getGPS(){
  return new Promise(function(resolve){
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      function(pos){resolve({lat:pos.coords.latitude,lng:pos.coords.longitude});},
      function(){resolve(null);},
      {timeout:5000,maximumAge:60000,enableHighAccuracy:false}
    );
  });
}

async function checkout(isVend,discInfo){
  if(!cart.length)return;

  /* Sincronizar inputs del carrito al objeto antes de confirmar */
  for(var _i=0;_i<cart.length;_i++){
    var _qc=document.getElementById('qc_'+_i);
    var _qu=document.getElementById('qu_'+_i);
    if(_qc) cart[_i].cj=Math.max(0,parseInt(_qc.value)||0);
    if(_qu) cart[_i].ud=Math.max(0,parseInt(_qu.value)||0);
  }
  /* Eliminar ítems con cj=0 y ud=0 */
  cart=cart.filter(function(ci){return (ci.cj||0)+(ci.ud||0)>0;});
  if(!cart.length){toast('El carrito está vacío','warn');return;}

  var cid=window._cid||'';
  var _cObj=cid?(window._posCs||[]).find(function(c){return c.id===cid;}):null;
  var cNom=_cObj?_cObj.nombre:'Consumidor Final';
  var cDiasCredito=_cObj?Number(_cObj.dias_credito||0):0;
  /* FIX 2: Calcular items y total atómicamente desde el carrito sincronizado
     No usar discInfo.tot de la UI — recalcular desde cero */
  var items=cart.map(function(c){
    var cj=c.cj||0, ud=c.ud||0;
    var sub=cj*c.pCaja+ud*c.pUnit;
    return{id:c.id, nombre:c.nombre,
      cantidad_cajas:cj, cantidad_unidades:ud,
      cantidad:cj*c.upc+ud,
      precio:c.pUnit, precio_caja:c.pCaja, upc:c.upc,
      subtotal:sub};
  });

  /* Recalcular subtotal desde items — fuente de verdad */
  var total=items.reduce(function(s,i){return s+i.subtotal;},0);

  /* Descuento: recalcular aquí también, no confiar en discInfo.tot */
  var discAmt=0, discType='fixed';
  if(discInfo&&discInfo.dval>0){
    discType=discInfo.dtype||'fixed';
    discAmt=discType==='pct'
      ? Math.min(total, total*(discInfo.dval/100))
      : Math.min(total, discInfo.dval);
  }
  var totalFinal=Math.max(0, total-discAmt);

  /* Folio: online = DB max+1 · offline = 9xxxxxx timestamp */
  var folio;
  if(_isOnline){
    var fr=await db.from('ventas').select('numero_factura').eq('empresa_id',S.empresa_id).order('numero_factura',{ascending:false}).limit(1);
    folio=((fr.data&&fr.data.length&&fr.data[0].numero_factura)||0)+1;
  } else {
    folio=9000000+(Date.now()%100000);
  }

  /* GPS — no bloqueante: si se deniega, la venta se guarda igual */
  var gps=await getGPS();

  /* Fecha personalizada si el usuario la cambió */
  var _fechaInput=g('ventaFecha');
  var _fechaVal=_fechaInput&&_fechaInput.value?_fechaInput.value:null;
  var _createdAt=_fechaVal?new Date(_fechaVal+'T12:00:00').toISOString():new Date().toISOString();
  var ventaPayload={numero_factura:folio,cliente:cNom,cliente_id:cid||null,total:totalFinal,total_bruto:total,descuento:discAmt,descuento_tipo:discType,
    productos_vendidos:items,empresa_id:S.empresa_id,user_id:S.id,
    created_at:_createdAt,
    lat:gps?gps.lat:null,lng:gps?gps.lng:null};

  /* FIX 4: Anti-race condition — leer stock real de BD antes de decrementar */
  var stockOps=[];
  var stockErr=false;
  for(var i=0;i<cart.length;i++){
    var it=cart[i];
    var _need=(it.cj||0)*it.upc+(it.ud||0); /* unidades requeridas */
    if(isVend){
      /* Leer stock real del vendedor */
      var bvFresh=await db.from('bodega_vendedor').select('id,stock').eq('id',it.id).maybeSingle();
      var bvStock=bvFresh.data?Number(bvFresh.data.stock||0):0;
      if(_need>bvStock){
        toast('Sin stock suficiente: '+esc(it.nombre)+' (disponible: '+bvStock+')','err');
        stockErr=true; break;
      }
      var ns=Math.max(0,bvStock-_need);
      stockOps.push({table:'bodega_vendedor',id:it.id,newStock:ns});
      /* Actualizar cache optimistamente */
      var bvLoc=cache.bv.find(function(b){return b.id===it.id;});
      if(bvLoc) bvLoc.stock=ns;
    } else {
      /* Leer stock real del producto */
      var prFresh=await db.from('productos').select('id,stock').eq('id',it.id).maybeSingle();
      var prStock=prFresh.data?Number(prFresh.data.stock||0):0;
      if(_need>prStock){
        toast('Sin stock suficiente: '+esc(it.nombre)+' (disponible: '+prStock+')','err');
        stockErr=true; break;
      }
      var ns2=Math.max(0,prStock-_need);
      stockOps.push({table:'productos',id:it.id,newStock:ns2});
      var prLoc=cache.prods.find(function(p){return p.id===it.id;});
      if(prLoc) prLoc.stock=ns2;
    }
  }
  if(stockErr) return; /* abortar venta si hay stock insuficiente */

  if(_isOnline){
    var vr=await db.from('ventas').insert([ventaPayload]);
    if(vr.error){toast('Error al guardar: '+vr.error.message,'err');return;}
    for(var k=0;k<stockOps.length;k++){
      var so=stockOps[k];
      if(so.table==='productos'){await db.from('productos').update({stock:so.newStock}).eq('id',so.id);}
      else{await db.from('bodega_vendedor').update({stock:so.newStock}).eq('id',so.id);}
    }
  } else {
    idbPush({type:'venta',payload:ventaPayload,stockOps:stockOps,ts:Date.now()},function(){updatePendingBadge();updateConnDot();});
    toast('📴 Venta guardada — se sincronizará al reconectar','warn');
  }

  var empData={nombre:S.empresa_nombre||'Bridge Control',telefono:'',direccion:''};
  if(_isOnline){
    var empR=await db.from('empresas').select('nombre,telefono,direccion,logo').eq('id',S.empresa_id).maybeSingle();
    if(empR.data)empData=empR.data;
  }
  showInvoice(folio,cNom,items,totalFinal,empData,discAmt,cDiasCredito);

  /* If reopened venta — mark original as replaced */
  if(window._reopenRef&&_isOnline){
    var _ref=window._reopenRef;
    window._reopenRef=null;
    db.from('ventas').update({anulada:true,reemplazada_por:folio}).eq('id',_ref.id).then(function(){
      toast('Factura #'+String(_ref.folio).padStart(4,'0')+' marcada como reemplazada ✓','ok');
    });
  } else {
    window._reopenRef=null;
  }

  cart=[];
  if(!isVend)render();else{await loadBV();render();}
}

function showInvoice(folio,cliente,items,total,emp,discAmt,diasCredito){
  discAmt=discAmt||0;
  var subtot=items.reduce(function(s,i){
    var cj=(i.cj||i.cantidad_cajas)||0,ud=(i.ud||i.cantidad_unidades)||0,upc=i.upc||1;
    var pCaja=i.pCaja||i.precio_caja||(i.precio*upc);
    return s+(i.subtotal||(cj*pCaja+ud*i.precio));
  },0);
  /* Recalcular total desde subtot para evitar bug de descuento residual */
  total=Math.max(0,subtot-discAmt);
  var folioStr='#'+String(folio).padStart(4,'0');
  var dateStr=new Date().toLocaleString('es');
  var logoHtml=emp.logo?'<img src="'+emp.logo+'" style="max-height:60px;max-width:140px;object-fit:contain;margin-bottom:8px" onerror="this.style.display=\'none\'"/>':'';

  /* Build WhatsApp text */
  var waTxt='Factura '+folioStr+' — '+emp.nombre+'\nCliente: '+cliente+'\n'+dateStr+'\n\n'+
    items.map(function(i){return'• '+i.nombre+' x'+i.cantidad+' = '+fm(i.precio*i.cantidad);}).join('\n')+
    (discAmt>0?'\n\nDescuento: - '+fm(discAmt):'')+ '\n\nTOTAL: '+fm(total)+'\n\n📲 '+getAppUrl();

  /* Editable items table */
  function buildEditTbl(its,disc){
    return its.map(function(it,idx2){
      var cj=it.cj||0;
      var ud=it.ud||0;
      var upc=it.upc||it.unidades_por_caja||1;
      var pCaja=it.pCaja||it.precio_caja||(it.precio*upc)||0;
      var lineTotal=cj*pCaja + ud*it.precio;
      return'<tr>'+
        '<td style="font-weight:600">'+esc(it.nombre)+'</td>'+
        '<td style="text-align:center;font-family:monospace">'+(cj>0?'<strong>'+cj+'</strong>':'—')+'</td>'+
        '<td style="text-align:center;font-family:monospace">'+(ud>0?'<strong>'+ud+'</strong>':'—')+'</td>'+
        '<td style="text-align:center;font-family:monospace;color:#888">'+(upc>1?upc:'—')+'</td>'+
        '<td style="text-align:right;font-family:monospace">'+fm(pCaja)+'</td>'+
        '<td class="r" id="ie_t_'+idx2+'">'+fm(lineTotal)+'</td>'+
      '</tr>';
    }).join('');
  }

  function rebuildTotals(its,disc){

function bcPrint(htmlContent){
  /* Overlay directo sin iframe ni blob — compatible con PWA, Android, CSP */
  var ov=document.getElementById('_printOverlay');
  if(ov) ov.remove();

  ov=document.createElement('div');
  ov.id='_printOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;background:#f1f5f9';

  /* Barra de acciones */
  var bar=document.createElement('div');
  bar.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0f172a;flex-shrink:0;';
  bar.innerHTML=
    '<button id="_pBack" style="background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px 12px;border-radius:6px;line-height:1">←</button>'+
    '<span style="color:#fff;font-weight:700;font-size:14px;flex:1">Reporte de Auditoría</span>'+
    '<button id="_pPrint" style="background:#06b6d4;border:none;color:#000;font-weight:800;font-size:13px;cursor:pointer;border-radius:8px;padding:9px 18px">🖨 Imprimir</button>';

  /* Contenedor del reporte — scroll */
  var wrap=document.createElement('div');
  wrap.style.cssText='flex:1;overflow:auto;padding:16px;';

  /* Extraer solo el body del HTML para insertarlo */
  var bodyMatch=htmlContent.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  var bodyHTML=bodyMatch?bodyMatch[1]:htmlContent;

  /* Inyectar los estilos del reporte */
  var styleMatch=htmlContent.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
  var reportStyles=styleMatch?'<style>'+styleMatch[1]+'</style>':'';

  wrap.innerHTML=reportStyles+'<div style="max-width:780px;margin:0 auto;background:#fff;border-radius:8px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.08)">'+bodyHTML+'</div>';

  ov.appendChild(bar);
  ov.appendChild(wrap);
  document.body.appendChild(ov);

  document.getElementById('_pBack').onclick=function(){ov.remove();};

  document.getElementById('_pPrint').onclick=function(){
    /* Imprimir solo el contenido del reporte */
    var printWin=window.open('','_blank','width=800,height=600');
    if(printWin){
      printWin.document.write(htmlContent);
      printWin.document.close();
      setTimeout(function(){printWin.focus();printWin.print();},500);
    } else {
      /* Fallback: imprimir toda la página ocultando todo excepto el reporte */
      var style=document.createElement('style');
      style.id='_printStyle';
      style.textContent='@media print{body>*:not(#_printOverlay){display:none!important}#_printOverlay{position:static!important}#_pBack,#_pPrint{display:none!important}}';
      document.head.appendChild(style);
      window.print();
      setTimeout(function(){var s=document.getElementById('_printStyle');if(s)s.remove();},1000);
    }
  };

  /* Botón atrás físico Android */
  var _bcHandler=function(e){
    var o=document.getElementById('_printOverlay');
    if(o) o.remove();
    window.removeEventListener('popstate',_bcHandler);
  };
  history.pushState({bcPrint:true},'');
  window.addEventListener('popstate',_bcHandler);
}
/* ─── bcExcelShare: comparte Excel via Web Share API (Android) ─── */
async function bcExcelShare(wb, fname){
  try {
    var wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    var file=new File([wbout], fname, {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:fname});
      return;
    }
  } catch(e){ /* fall through */ }
  /* Último recurso: XLSX.writeFile (funciona en navegador web, puede fallar en APK) */
  try{ XLSX.writeFile(wb,fname); toast('Excel descargado ✓','ok'); }
  catch(e2){ toast('No se pudo exportar: '+e2.message,'warn'); }
}

async function entradaStock(prod){
  var pr=await db.from('proveedores').select('id,nombre').eq('empresa_id',S.empresa_id).order('nombre',{ascending:true});
  var provs=pr.data||[];
  var upcE=prod.unidades_por_caja>0?prod.unidades_por_caja:1;
  var curB=toBoxes(prod.stock,upcE);
  var curLabel=curB.cajas>0?curB.cajas+'cj'+(curB.sueltas>0?' '+curB.sueltas+'u':''):curB.sueltas+'u';
  modal('📦 Entrada de Stock — '+esc(prod.nombre),
    '<div style="font-size:12px;color:var(--txt3);margin-bottom:12px;font-family:var(--mono)">Stock actual: <strong style="color:var(--cyan)">'+curLabel+'</strong> ('+upcE+' u/cj)</div>'+
    '<div class="fld"><label>Proveedor</label>'+
      '<select id="esP"><option value="">— Sin proveedor —</option>'+provs.map(function(v){return'<option value="'+v.id+'">'+esc(v.nombre)+'</option>';}).join('')+'</select>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="fld"><label>Cajas a ingresar</label><input id="esCj" type="number" min="0" value="0" oninput="var u=parseInt(document.getElementById(\'esUd\').value)||0;var c=parseInt(this.value)||0;document.getElementById(\'esTotal\').textContent=\'+ \'+c+\'cj \'+u+\'u = \'+fm((c*'+upcE+'+u)*'+prod.precio_venta+')"/></div>'+
      '<div class="fld"><label>Unidades sueltas</label><input id="esUd" type="number" min="0" value="0" oninput="var c=parseInt(document.getElementById(\'esCj\').value)||0;var u=parseInt(this.value)||0;document.getElementById(\'esTotal\').textContent=\'+ \'+c+\'cj \'+u+\'u = \'+fm((c*'+upcE+'+u)*'+prod.precio_venta+')"/></div>'+
    '</div>'+
    '<div style="padding:8px 12px;background:rgba(16,185,129,.1);border-radius:var(--r);font-size:13px;font-family:var(--mono);color:var(--green)" id="esTotal">+ 0cj 0u</div>'+
    '<div class="fld"><label>Costo unitario de esta entrada ($)</label><input id="esCo" type="number" step="0.01" min="0" value="'+prod.costo+'"/></div>'+
    '<div class="fld"><label>Nota (opcional)</label><input id="esNota" placeholder="Número de factura, lote, etc…"/></div>',
    '<button class="btn ghost sm" id="esCn">Cancelar</button><button class="btn g sm" id="esOk">Registrar entrada</button>');
  g('esCn').onclick=closeModal;
  g('esOk').onclick=async function(){
    var cj=parseInt(g('esCj').value)||0;
    var ud=parseInt(g('esUd').value)||0;
    var addUnits=cj*upcE+ud;
    if(addUnits<=0){toast('Ingresa al menos 1 caja o 1 unidad','warn');return;}
    var co=parseFloat(g('esCo').value)||0;
    var nota=g('esNota').value.trim();
    var pId=g('esP').value||null;
    var nuevoStock=prod.stock+addUnits;
    var r=await db.from('productos').update({stock:nuevoStock,costo:co||prod.costo}).eq('id',prod.id);
    if(r.error){toast('Error: '+r.error.message,'err');return;}
    /* Audit entry */
    await db.from('entradas_stock').insert([{empresa_id:S.empresa_id,producto_id:prod.id,producto_nom:prod.nombre,
      cantidad:addUnits,cantidad_cajas:cj,cantidad_unidades:ud,costo_unitario:co,
      proveedor_id:pId,nota:nota,admin_id:S.id}]).catch(function(){});
    toast('Entrada registrada: +'+cj+'cj '+ud+'u ✓','ok');
    closeModal();
    await loadProds();pintarInv(cache.prods,'');
  };
}

      '<div style="padding:10px 14px;flex:1;overflow-y:auto">'+
        '<div style="font-size:11px;color:var(--txt3);margin-bottom:6px;font-weight:600">PRODUCTOS EN LA FACTURA</div>'+

      /* Totals */
      '<div style="padding:10px 14px;border-top:1px solid var(--border);background:var(--s1)">'+
        (disc>0?'<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-bottom:4px"><span>Subtotal</span><span style="font-family:var(--mono)">'+fm(subtotal)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--amber);margin-bottom:4px"><span>Descuento</span><span style="font-family:var(--mono)">- '+fm(disc)+'</span></div>':'') +
        '<div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;font-family:var(--mono);color:var(--green);margin-bottom:12px">'+
          '<span>TOTAL</span><span>'+fm(total)+'</span>'+
        '</div>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
          '<button id="ieCancel" class="btn ghost sm" style="flex:1">Cancelar</button>'+
          '<button id="ieReprint" class="btn sl sm" style="flex:1">🖨 Reimprimir</button>'+
          '<button id="ieSave" class="btn g sm" style="flex:2">💾 Guardar cambios</button>'+
        '</div>'+

  /* Overlay + panel */
  var overlay=document.createElement('div');
  overlay.id='ieOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:flex;align-items:flex-end;justify-content:flex-end';
  overlay.innerHTML='<div id="ieWrap" style="width:100%;max-width:420px;height:90vh;display:flex;flex-direction:column;background:var(--s1);border-radius:var(--r2) var(--r2) 0 0;overflow:hidden">'+buildEditorHTML()+'</div>';
  document.body.appendChild(overlay);

  function rebuildPanel(){
    g('ieWrap').innerHTML=buildEditorHTML();
    wireEditor();
  }

  function wireEditor(){
    /* Close */
    g('ieClose').onclick=g('ieCancel').onclick=function(){overlay.remove();};

    /* Reimprimir */
    var reprintBtn=g('ieReprint');
    if(reprintBtn){
      reprintBtn.onclick=async function(){
        var empR=await db.from('empresas').select('nombre,telefono,direccion,logo').eq('id',S.empresa_id).maybeSingle();
        var emp=empR.data||{nombre:S.empresa_nombre||'Bridge Control'};
        var subtotal=items.reduce(function(s,i){return s+i.precio*i.cantidad;},0);
        var disc=Number(v.descuento||0);
        var tot=Math.max(0,subtotal-disc);
        var itPrint=items.map(function(i){return{nombre:i.nombre,precio:i.precio,cantidad:i.cantidad,cj:i.cj||0,ud:i.ud||0,upc:i.upc||1,pCaja:i.pCaja||i.precio,precio_caja:i.pCaja||i.precio};});
        showInvoice(v.numero_factura,v.cliente||'Consumidor Final',itPrint,tot,emp,disc);
      };
    }

    /* +/- and delete on items */
    g('ieRows').querySelectorAll('.ie-btn').forEach(function(b){
      b.onclick=function(){
        var i=parseInt(b.dataset.idx);
        if(b.dataset.op==='plus') items[i].cantidad++;
        else{items[i].cantidad--;if(items[i].cantidad<=0)items.splice(i,1);}
        rebuildPanel();
      };
    });
    g('ieRows').querySelectorAll('.ie-del').forEach(function(b){
      b.onclick=function(){items.splice(parseInt(b.dataset.idx),1);rebuildPanel();};
    });

    /* Product search */
    var searchEl=g('ieSearch');
    var suggest=g('ieSuggest');
    searchEl.oninput=function(){
      var q=this.value.trim().toLowerCase();
      if(!q){suggest.style.display='none';return;}
      var hits=allProds.filter(function(p){return p.nombre.toLowerCase().indexOf(q)>=0&&p.stock>0;}).slice(0,8);
      if(!hits.length){suggest.style.display='none';return;}
      suggest.innerHTML=hits.map(function(p){
        return '<div class="ie-sug" data-pid="'+p.id+'" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">'+
          '<div><div style="font-size:13px;font-weight:600">'+esc(p.nombre)+'</div>'+
          '<div style="font-size:11px;color:var(--txt3)">Stock: '+p.stock+'</div></div>'+
          '<div style="font-size:13px;font-weight:700;color:var(--green);font-family:var(--mono)">'+fm(p.precio_venta)+'</div>'+
        '</div>';
      }).join('');
      suggest.style.display='block';
      suggest.querySelectorAll('.ie-sug').forEach(function(row){
        row.onmousedown=row.ontouchstart=function(e){
          e.preventDefault();
          var p=allProds.find(function(x){return x.id===row.dataset.pid;});
          if(!p)return;
          var ex=items.find(function(i){return i.id===p.id;});
          if(ex){ex.cantidad++;}
          else{items.push({id:p.id,nombre:p.nombre,precio:p.precio_venta,cantidad:1,orig:0});}
          searchEl.value='';suggest.style.display='none';
          rebuildPanel();
        };
      });
    };
    searchEl.onblur=function(){setTimeout(function(){suggest.style.display='none';},200);};

    /* Save */
    g('ieSave').onclick=async function(){
      if(!items.length){toast('La factura no puede quedar sin productos','warn');return;}
      g('ieSave').disabled=true;g('ieSave').textContent='Guardando…';

      /* Calculate stock adjustments */
      var stockOps=[];
      /* Items removed or reduced: return stock */
      v.productos_vendidos.forEach(function(orig){
        var cur=items.find(function(i){return i.id===orig.id;});
        var curQty=cur?cur.cantidad:0;
        var diff=Number(orig.cantidad)-curQty; /* positive = returned to stock */
        if(diff!==0&&orig.id&&orig.id!=='manual'){
          stockOps.push({id:orig.id,delta:diff}); /* positive = add back, negative = take more */
        }
      });
      /* New items added (not in original) */
      items.forEach(function(cur){
        var wasOrig=v.productos_vendidos.find(function(o){return o.id===cur.id;});
        if(!wasOrig&&cur.id&&cur.id!=='manual'){
          stockOps.push({id:cur.id,delta:-((cur.cj||0)*cur.upc+(cur.ud||0))}); /* take from stock */
        }
      });

      var newTotal=items.reduce(function(s,i){return s+i.precio*i.cantidad;},0)-Number(v.descuento||0);
      var payload={
        productos_vendidos:items.map(function(i){return{id:i.id,nombre:i.nombre,precio:i.precio,cantidad:i.cantidad,cj:i.cj||0,ud:i.ud||0,upc:i.upc||1,precio_caja:i.pCaja||0};}),
        total:newTotal,
        total_bruto:items.reduce(function(s,i){return s+i.precio*i.cantidad;},0),
        editada:true
      };

      /* Apply stock ops */
      for(var si=0;si<stockOps.length;si++){
        var op=stockOps[si];
        var pr2=await db.from('productos').select('stock,stock_vendedor').eq('id',op.id).maybeSingle();
        if(pr2.data){
          var field=S.role==='vendedor'?'stock_vendedor':'stock';
          var curSt=Number(pr2.data[field]||pr2.data.stock||0);
          await db.from('productos').update({[field]:Math.max(0,curSt+op.delta)}).eq('id',op.id);
        }
      }

      /* Update venta */
      var r=await db.from('ventas').update(payload).eq('id',v.id);
      if(r.error){toast('Error: '+r.error.message,'err');g('ieSave').disabled=false;g('ieSave').textContent='💾 Guardar cambios';return;}

      overlay.remove();
      toast('Factura #'+folio+' actualizada ✓','ok');
      await loadProds();
      histVentas();
    };
  }

  wireEditor();
}


/* ══ ANÁLISIS DE VENTAS ══ */
async function adminAnalisisVentas(){
  g('page').innerHTML='<div class="empty">Cargando datos…</div>';

  /* Cargar ventas y productos */
  var rV=await db.from('ventas')
    .select('id,total,created_at,user_id,productos_vendidos,anulada')
    .eq('empresa_id',S.empresa_id)
    .order('created_at',{ascending:false})
    .limit(2000);
  var rP=await db.from('productos')
    .select('id,nombre,stock,unidades_por_caja,precio_venta,costo,margen,categoria')
    .eq('empresa_id',S.empresa_id);
  var rU=await db.from('usuarios')
    .select('id,nombre,username,role')
    .eq('empresa_id',S.empresa_id)
    .in('role',['vendedor','v_inv','admin']);

  var vsAll=(rV.data||[]).filter(function(v){return !v.anulada;});
  var ps=rP.data||[];
  var users=rU.data||[];

  /* Diagnóstico — mostrar si hay error o datos vacíos */
  if(rV.error||rP.error){
    g('page').innerHTML='<div class="panel" style="margin:12px"><div class="ph"><div class="ptitle" style="color:var(--red)">⚠ Error de carga</div></div>'+
      '<div style="padding:14px;font-size:12px;font-family:var(--mono)">'+
      (rV.error?'<div style="color:var(--red)">ventas: '+esc(rV.error.message)+'</div>':'')+
      (rP.error?'<div style="color:var(--red)">productos: '+esc(rP.error.message)+'</div>':'')+
      '<br><button class="btn g sm" onclick="adminAnalisisVentas()">🔄 Reintentar</button>'+
      '</div></div>';
    return;
  }
  if(!vsAll.length){
    g('page').innerHTML='<div class="panel" style="margin:12px"><div class="empty" style="padding:24px">'+
      'Sin ventas registradas para esta empresa.<br><small style="color:var(--txt3)">empresa_id: '+esc(String(S.empresa_id||'null'))+'</small>'+
    '</div></div>';
    return;
  }

  /* Mapa de productos */
  var prodMap={};
  ps.forEach(function(p){prodMap[p.id]=p;});

  /* Mapa de usuarios */
  var userMap={};
  users.forEach(function(u){userMap[u.id]=u.nombre||u.username;});

  /* ── Calcular stats por producto ── */
  var prodStats={};
  vsAll.forEach(function(v){
    var pv=v.productos_vendidos;
    if(typeof pv==='string'){try{pv=JSON.parse(pv);}catch(e){pv=[];}}
    if(!Array.isArray(pv))return;
    var fecha=v.created_at?(v.created_at||'').slice(0,10):'';
    pv.forEach(function(i){
      var id=i.id||'';var nom=i.nombre||'';if(!nom)return;
      var key=id||nom;
      var upc=Number(i.upc||1);
      var cj=Number(i.cantidad_cajas||i.cj||0);
      var ud=Number(i.cantidad_unidades||i.ud||0);
      if(!cj&&!ud){var tot=Number(i.cantidad||0);if(upc>1){cj=Math.floor(tot/upc);ud=tot%upc;}else ud=tot;}
      var uds=cj*upc+ud;
      var venta=Number(i.subtotal||(cj*(i.precio_caja||0)+ud*(i.precio||0)))||0;
      if(!prodStats[key])prodStats[key]={id:id,nom:nom,uds:0,venta:0,porFecha:{}};
      prodStats[key].uds+=uds;
      prodStats[key].venta=Math.round((prodStats[key].venta+venta)*100)/100;
      if(fecha){
        prodStats[key].porFecha[fecha]=(prodStats[key].porFecha[fecha]||0)+uds;
      }
    });
  });

  /* ── Calcular stats por vendedor ── */
  var vendStats={};
  vsAll.forEach(function(v){
    var uid=v.user_id||'admin';
    var unom=userMap[uid]||'Admin';
    if(!vendStats[uid])vendStats[uid]={id:uid,nom:unom,total:0,facturas:0,prods:{}};
    vendStats[uid].total=Math.round((vendStats[uid].total+Number(v.total||0))*100)/100;
    vendStats[uid].facturas++;
    var pv=v.productos_vendidos;
    if(typeof pv==='string'){try{pv=JSON.parse(pv);}catch(e){pv=[];}}
    if(!Array.isArray(pv))return;
    pv.forEach(function(i){
      var nom=i.nombre||'';if(!nom)return;
      var upc=Number(i.upc||1);
      var cj=Number(i.cantidad_cajas||i.cj||0);
      var ud=Number(i.cantidad_unidades||i.ud||0);
      if(!cj&&!ud){var tot=Number(i.cantidad||0);if(upc>1){cj=Math.floor(tot/upc);ud=tot%upc;}else ud=tot;}
      var uds=cj*upc+ud;
      vendStats[uid].prods[nom]=(vendStats[uid].prods[nom]||0)+uds;
    });
  });

  var prodList=Object.values(prodStats).sort(function(a,b){return b.uds-a.uds;});
  var vendList=Object.values(vendStats).sort(function(a,b){return b.total-a.total;});
  var maxProd=prodList[0]?prodList[0].uds:1;
  var maxVend=vendList[0]?vendList[0].total:1;

  /* ── Render ── */
  var activeTab='productos';

  function renderTabs(){
    g('page').innerHTML=
      /* Tabs */
      '<div style="display:flex;gap:0;border-bottom:2px solid var(--border2);margin-bottom:0;background:var(--s2)">'+
        '<button id="tabProd" data-avtab="productos" style="flex:1;padding:12px 8px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:'+(activeTab==='productos'?'var(--bg)':'var(--s2)')+';color:'+(activeTab==='productos'?'var(--cyan)':'var(--txt3)')+';border-bottom:'+(activeTab==='productos'?'2px solid var(--cyan)':'none')+'">📦 Productos</button>'+
        '<button id="tabVend" data-avtab="vendedores" style="flex:1;padding:12px 8px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:'+(activeTab==='vendedores'?'var(--bg)':'var(--s2)')+';color:'+(activeTab==='vendedores'?'var(--cyan)':'var(--txt3)')+';border-bottom:'+(activeTab==='vendedores'?'2px solid var(--cyan)':'none')+'">👤 Vendedores</button>'+
        '<button id="tabPer" data-avtab="periodo" style="flex:1;padding:12px 8px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:'+(activeTab==='periodo'?'var(--bg)':'var(--s2)')+';color:'+(activeTab==='periodo'?'var(--cyan)':'var(--txt3)')+';border-bottom:'+(activeTab==='periodo'?'2px solid var(--cyan)':'none')+'">📅 Período</button>'+
      '</div>'+
      '<div id="avContent" style="padding-bottom:80px"></div>';
    renderTabContent();
    /* Wire tab buttons */
    document.querySelectorAll('[data-avtab]').forEach(function(btn){
      btn.onclick=function(){activeTab=btn.dataset.avtab;renderTabs();};
    });
    /* Wire product and vendor cards */
    document.querySelectorAll('[data-avpid]').forEach(function(card){
      card.onclick=function(){window._avProd(card.dataset.avpid,card.dataset.avpnom);};
    });
    document.querySelectorAll('[data-avvid]').forEach(function(card){
      card.onclick=function(){window._avVend(card.dataset.avvid,card.dataset.avvnom);};
    });
  }

  window._avTab=function(tab){activeTab=tab;renderTabs();};

  function sparkline(fechaMap,color){
    /* Últimas 8 semanas */
    var weeks=[];
    for(var wi=7;wi>=0;wi--){
      var d=new Date(Date.now()-wi*7*86400000);
      var weekDates=[];
      for(var di=0;di<7;di++){
        var dd=new Date(d.getTime()+di*86400000);
        weekDates.push(dd.toISOString().slice(0,10));
      }
      var sum=weekDates.reduce(function(s,dt){return s+(fechaMap[dt]||0);},0);
      weeks.push(sum);
    }
    var mx=Math.max.apply(null,weeks)||1;
    var bars=weeks.map(function(v,i){
      var px=v>0?Math.max(3,Math.round(v/mx*28)):0;
      return '<div style="flex:1;display:flex;align-items:flex-end;height:32px">'+
        '<div style="width:100%;border-radius:2px 2px 0 0;background:'+(px>0?color:'var(--s3)')+';height:'+px+'px"></div>'+
      '</div>';
    }).join('');
    return '<div style="display:flex;gap:2px;height:32px;align-items:flex-end">'+bars+'</div>';
  }

  function renderTabContent(){
    var ct=document.getElementById('avContent');if(!ct)return;

    if(activeTab==='productos'){
      if(!prodList.length){ct.innerHTML='<div class="empty" style="padding:32px">Sin datos de ventas</div>';return;}

          return'<div data-avpid="'+p.id+'" data-avpnom="'+esc(p.nom)+'" style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer">'+
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+

              '<div style="flex:1;min-width:0">'+

                '<div style="font-size:11px;color:var(--txt3)">'+p.uds+' uds vendidas &nbsp;·&nbsp; '+fm(p.venta)+

              '</div>'+
              '<div style="width:60px">'+sparkline(p.porFecha,'var(--cyan)')+'</div>'+

            '<div style="background:var(--s3);border-radius:4px;height:6px;overflow:hidden">'+
              '<div style="height:100%;border-radius:4px;background:var(--cyan);width:'+pct+'%"></div>'+
            '</div>'+
          '</div>';
        }).join('');

    } else if(activeTab==='vendedores'){
      if(!vendList.length){ct.innerHTML='<div class="empty" style="padding:32px">Sin datos de vendedores</div>';return;}
      ct.innerHTML=
        '<div style="padding:10px 14px 6px;font-size:11px;color:var(--txt3)">Toca un vendedor para ver sus productos</div>'+
        vendList.map(function(v,i){
          var pct=Math.round(v.total/maxVend*100);
          var medals=['🥇','🥈','🥉'];
          return'<div data-avvid="'+v.id+'" data-avvnom="'+esc(v.nom)+'" style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer">'+
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+
              '<span style="font-size:18px;width:28px;text-align:center">'+(i<3?medals[i]:(i+1))+'</span>'+
              '<div style="flex:1">'+
                '<div style="font-weight:700;font-size:13px">'+esc(v.nom)+'</div>'+
                '<div style="font-size:11px;color:var(--txt3)">'+v.facturas+' facturas &nbsp;·&nbsp; <span style="color:var(--green);font-weight:700">'+fm(v.total)+'</span></div>'+
              '</div>'+
              '<span style="font-size:11px;color:var(--txt3)">›</span>'+
            '</div>'+
            '<div style="background:var(--s3);border-radius:4px;height:6px;overflow:hidden">'+
              '<div style="height:100%;border-radius:4px;background:var(--green);width:'+pct+'%"></div>'+
            '</div>'+
          '</div>';

    } else if(activeTab==='periodo'){
      var hoyStr=new Date().toLocaleDateString('en-CA');

          '<input type="date" id="avHasta" value="'+hoyStr+'" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:6px 10px;font-size:12px;outline:none"/>'+
          '<button class="btn g sm" id="avFiltrar">Filtrar</button>'+
        '</div>'+
        '<div id="avPeriodoResult" style="padding:14px"></div>';

      function calcPeriodo(){
        var desde=document.getElementById('avDesde').value;
        var hasta=document.getElementById('avHasta').value;
        var filtradas=vsAll.filter(function(v){
          if(!v.created_at)return false;
          var d=v.created_at.slice(0,10);
          return(!desde||d>=desde)&&(!hasta||d<=hasta);
        });
        /* Debug: verificar totales */
        var _dbg=filtradas.slice(0,3).map(function(v){return v.created_at.slice(0,10)+':$'+v.total;}).join(' | ');
        var totFact=filtradas.reduce(function(s,v){return Math.round((s+Number(v.total||0))*100)/100;},0);
        /* Por hora */
        var porHora=new Array(24).fill(0);
        filtradas.forEach(function(v){
          if(v.created_at){var h=new Date(v.created_at).getHours();porHora[h]+=Number(v.total||0);}
        });
        var maxH=Math.max.apply(null,porHora)||1;
        var horaChart=porHora.map(function(val,h){
          var px=val>0?Math.max(4,Math.round(val/maxH*60)):0;
          return'<div style="display:flex;flex-direction:column;align-items:center;flex:1">'+
            '<div style="width:100%;display:flex;align-items:flex-end;height:60px">'+
              '<div style="width:100%;border-radius:2px 2px 0 0;background:'+(px>0?'var(--cyan)':'var(--s3)')+';height:'+px+'px"></div>'+
            '</div>'+
            '<div style="font-size:8px;color:var(--txt3)">'+(h%6===0?h+'h':'')+'</div>'+
          '</div>';
        }).join('');
        /* Por día */
        var porDia={};
        filtradas.forEach(function(v){var d=v.created_at.slice(0,10);porDia[d]=(porDia[d]||0)+Number(v.total||0);});
        var diasArr=Object.entries(porDia).sort(function(a,b){return a[0]<b[0]?-1:1;});
        var maxD=Math.max.apply(null,diasArr.map(function(e){return e[1];})||[1])||1;

        var res=document.getElementById('avPeriodoResult');

    var hayStock=prod&&Number(prod.stock||0)>0;

    /* Gráfica por semana (últimas 12) */
    var semanas=[];
    for(var wi=11;wi>=0;wi--){
      var d0=new Date(Date.now()-wi*7*86400000);

      for(var di=0;di<7;di++){

        '🔴 <strong>Caída en ventas.</strong> Las ventas recientes están por debajo de las anteriores. Revisar precio, stock o demanda.'+
      '</div>';

    g('page').innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10">'+

          '<div style="font-size:11px;color:var(--txt3)">'+p.uds+' uds vendidas · '+fm(p.venta)+'</div>'+
        '</div>'+
        (prod?'<span class="bd '+(sinStock?'bd-r':'bd-g')+'">'+(sinStock?'Sin stock':'En stock: '+prod.stock)+'</span>':'')+'</div>'+
      '<div style="padding:14px">'+
        insight+
        '<div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;margin-bottom:8px">Ventas por semana (últimas 12)</div>'+
        '<div style="display:flex;gap:4px;height:140px;align-items:flex-end;margin-bottom:16px">'+chart+'</div>'+
        (prod?
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
            '<div style="background:var(--s3);border-radius:8px;padding:10px;text-align:center">'+
              '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px">Costo/caja</div>'+
              '<div style="font-family:var(--mono);font-weight:800;color:var(--amber)">'+fm(prod.costo)+'</div>'+
            '</div>'+
            '<div style="background:var(--s3);border-radius:8px;padding:10px;text-align:center">'+
              '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px">Precio unit</div>'+
              '<div style="font-family:var(--mono);font-weight:800;color:var(--green)">'+fm(prod.precio_venta)+'</div>'+
            '</div>'+
            '<div style="background:var(--s3);border-radius:8px;padding:10px;text-align:center">'+
              '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px">Margen</div>'+
              '<div style="font-family:var(--mono);font-weight:800;color:var(--cyan)">'+prod.margen+'%</div>'+
            '</div>'+
            '<div style="background:var(--s3);border-radius:8px;padding:10px;text-align:center">'+
              '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px">Stock actual</div>'+
              '<div style="font-family:var(--mono);font-weight:800;color:'+(sinStock?'#ef4444':'var(--txt)')+'">'+prod.stock+'</div>'+
            '</div>'+
          '</div>'
        :'')+
      '</div>';
  };

  /* Detalle vendedor */
  window._avVend=function(vid2,vnom){
    var v=vendStats[vid2];
    if(!v)return;
    var topProds=Object.entries(v.prods).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
    var maxP=topProds[0]?topProds[0][1]:1;

    /* Ventas del vendedor por semana */
    var semsV=[];
    for(var wi=11;wi>=0;wi--){
      var d0=new Date(Date.now()-wi*7*86400000);

    var chartV=semsV.map(function(s){

        '<div style="width:100%;display:flex;align-items:flex-end;height:100px">'+
          '<div style="width:100%;border-radius:4px 4px 0 0;background:'+(px>0?'var(--green)':'var(--s3)')+';height:'+px+'px;transition:height .4s"></div>'+

        '<div style="font-size:8px;color:var(--txt3);text-align:center">'+s.lbl+'</div>'+
      '</div>';

    g('page').innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10">'+

        '</div>'+
      '</div>'+
      '<div style="padding:14px">'+
        '<div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;margin-bottom:8px">Facturación por semana (últimas 12)</div>'+
        '<div style="display:flex;gap:4px;height:140px;align-items:flex-end;margin-bottom:16px">'+chartV+'</div>'+
        '<div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">Sus productos más vendidos</div>'+

            '</div>'+
          '</div>';
        }).join(''):'<div class="empty">Sin datos</div>')+
      '</div>';
  };

  renderTabs();
}

async function histVentas(){
  g('page').innerHTML='<div class="empty">Cargando vendedores…</div>';
  /* Load vendors list for filter (admin only) */
  var vends=[];
  if(S.role==='admin'){
    var vr2=await db.from('usuarios').select('id,nombre,username').eq('empresa_id',S.empresa_id).eq('role','vendedor');
    vends=vr2.data||[];
  }

  /* Default date range: start of current month → today */
  var today=new Date();
  var y=today.getFullYear(),m=today.getMonth();
  var defFrom=new Date(y,m,1).toISOString().slice(0,10);
  var defTo=today.toISOString().slice(0,10);

  async function loadAndRender(fromD,toD,vendFilt){
    g('page').innerHTML='<div class="empty">Cargando datos…</div>';
    var q;
    var fromTs=fromD?new Date(fromD+'T00:00:00').toISOString():null;
    var toTs=toD?new Date(toD+'T23:59:59').toISOString():null;

    if(S.role==='vendedor'){
      q=db.from('ventas').select('id,total,total_bruto,descuento,descuento_tipo,created_at,cliente,user_id,numero_factura,anulada,editada,liquidada,productos_vendidos').eq('user_id',S.id);
    } else {
      q=db.from('ventas').select('id,total,total_bruto,descuento,descuento_tipo,created_at,cliente,user_id,numero_factura,anulada,editada,liquidada,productos_vendidos').eq('empresa_id',S.empresa_id);
    }
    /* Date filters applied post-fetch for simplicity since mini-client chains eq only */
    var vr=await q;
    var all=(vr.data||[]).filter(function(v){
      if(v.anulada)return false;
      if(fromTs&&v.created_at<fromTs)return false;
      if(toTs&&v.created_at>toTs)return false;
      if(vendFilt&&v.user_id!==vendFilt)return false;
      return true;
    });
    /* Fetch product costs for financial panel */
    var costMap={};
    var pr=await db.from('productos').select('id,nombre,costo,unidades_por_caja').eq('empresa_id',S.empresa_id);
    (pr.data||[]).forEach(function(p){var e={costo:p.costo||0,upc:p.unidades_por_caja||1};costMap[p.id]=e;costMap[p.nombre]=e;costMap[(p.nombre||'').toLowerCase()]=e;});
    drawReporte(all,vends,fromD,toD,vendFilt,defFrom,defTo,costMap);
  }

  await loadAndRender(defFrom,defTo,'');
}

function drawReporte(vs,vends,fromD,toD,vendFilt,defFrom,defTo,costMap){
  var isVend=S.role==='vendedor';

  /* ── Metrics ── */
  var totalFact=vs.reduce(function(s,v){return s+Number(v.total||0);},0);
  /* Financial panel calculations */
  var costM=costMap||{};
  var totalInvertido=vs.reduce(function(s,v){
    return s+(v.productos_vendidos||[]).reduce(function(ss,p){
      var ci=costM[p.id]||costM[p.nombre]||costM[(p.nombre||'').toLowerCase()];
      var costoUnit=ci?(ci.costo/(ci.upc||1)):0;
      return ss+(costoUnit*Number(p.cantidad||0));
    },0);
  },0);
  var totalRecuperado=totalFact;
  var ganancia=totalRecuperado-totalInvertido;
  var margen=totalInvertido>0?Math.round(ganancia/totalInvertido*100):0;
  var totalBruto=vs.reduce(function(s,v){return s+Number(v.total_bruto||v.total||0);},0);
  var totalDisc=vs.reduce(function(s,v){return s+Number(v.descuento||0);},0);
  var clientesSet=new Set();vs.forEach(function(v){if(v.cliente&&v.cliente!=='Consumidor Final')clientesSet.add(v.cliente);});
  var prodCnt={};
  vs.forEach(function(v){
    (v.productos_vendidos||[]).forEach(function(p){
      prodCnt[p.nombre]=(prodCnt[p.nombre]||0)+Number(p.cantidad||0);
    });
  });
  var topProds=Object.keys(prodCnt).map(function(k){return{n:k,c:prodCnt[k]};}).sort(function(a,b){return b.c-a.c;}).slice(0,5);

  /* ── Build rows ── */
  var rows=vs.map(function(v){
    var editada=v.editada?'<span style="font-size:9px;font-weight:800;background:#ef4444;color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px">CORR</span>':'';
    return'<tr>'+
      '<td style="font-family:var(--mono);font-size:12px">#'+String(v.numero_factura||'').padStart(4,'0')+editada+'</td>'+
      '<td>'+esc(v.cliente||'Consumidor Final')+'</td>'+
      (!isVend?'<td style="font-size:11px;color:var(--txt3)">'+esc((v.usuarios&&(v.usuarios.nombre||v.usuarios.username))||'—')+'</td>':'')+
      '<td style="font-family:var(--mono);color:var(--green);font-weight:700">'+fm(v.total)+'</td>'+
      (totalDisc>0?'<td style="font-family:var(--mono);font-size:11px;color:var(--amber)">'+(v.descuento>0?'- '+fm(v.descuento):'—')+'</td>':'')+
      '<td style="font-size:11px;color:var(--txt3)">'+fd(v.created_at)+'</td>'+
      '<td><div style="display:flex;gap:4px">'+
        '<button class="btn sl xs" data-vid="'+v.id+'">👁</button>'+
        (!isVend?'<button class="btn b xs" data-edit="'+v.id+'" title="Editar">✏</button>':'')+
        (!isVend?'<button class="btn r xs" data-void="'+v.id+'" data-vcli="'+esc(v.cliente||'')+'">🚫</button>':'')+
        (v.lat&&v.lng?'<a href="https://maps.google.com/?q='+v.lat+','+v.lng+'" target="_blank" class="btn sl xs" title="Ver ubicación GPS">📍</a>':'')+
      '</div></td>'+
    '</tr>';
  }).join('');

  var vendSel=!isVend?
    '<select id="repVend" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 9px;font-size:12px;outline:none">'+
      '<option value="">Todos los vendedores</option>'+
      vends.map(function(v){return'<option value="'+v.id+'"'+(vendFilt===v.id?' selected':'')+'>'+esc(v.nombre||v.username)+'</option>';}).join('')+
    '</select>':
    '';

  /* ── Arqueo ── */
  var arqueoBruto=vs.reduce(function(s,v){return s+Number(v.total_bruto||v.total||0);},0);
  var arqueoDes=vs.reduce(function(s,v){return s+Number(v.descuento||0);},0);
  var arqueoNeto=vs.reduce(function(s,v){return s+Number(v.total||0);},0);
  /* Agrupar por día para arqueo */
  var porDia={};
  vs.forEach(function(v){
    var d=(v.created_at||'').slice(0,10);
    if(!porDia[d])porDia[d]={fecha:d,cnt:0,bruto:0,desc:0,neto:0};
    porDia[d].cnt++;porDia[d].bruto+=Number(v.total_bruto||v.total||0);
    porDia[d].desc+=Number(v.descuento||0);porDia[d].neto+=Number(v.total||0);
  });
  var diaRows=Object.values(porDia).sort(function(a,b){return a.fecha<b.fecha?-1:1;})
    .map(function(d){
      return'<tr>'+
        '<td style="font-family:var(--mono);font-size:12px">'+d.fecha+'</td>'+

        '<td style="font-family:var(--mono);font-weight:700;color:var(--green)">'+fm(d.neto)+'</td>'+
      '</tr>';
    }).join('');

  g('page').innerHTML=
    /* ── Filter bar ── */

      '<button class="btn sl sm" id="repExcel" style="margin-left:auto">⬇ Excel</button>'+
    '</div>'+
    /* ── Quick date shortcuts ── */

      '<button class="btn sl xs" id="rqMesAnt">Mes anterior</button>'+
    '</div>'+

    '<div class="panel"><div class="ph">'+
      '<div class="ptitle">Ventas — '+vs.length+'</div>'+
    '</div>'+
    '<div class="twrap"><table><thead><tr>'+

      (!isVend?'<th>Vendedor</th>':'')+
      '<th>Total</th>'+

      '<th>Fecha</th><th></th>'+

    '<tbody>'+(rows||'<tr><td colspan="7" class="empty">Sin ventas en el período</td></tr>')+'</tbody></table></div></div>';

  /* Wire: aplicar filtros */
