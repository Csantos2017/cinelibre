    if(rf)rf.value=f;if(rt)rt.value=t;
    histVentasLoad(f,t,g('repVend')&&g('repVend').value||'',vends);
  }
  var _td=new Date();
  var _pad=function(n){return String(n).padStart(2,'0');};
  var _fmt=function(d){return d.getFullYear()+'-'+_pad(d.getMonth()+1)+'-'+_pad(d.getDate());};
  var todayStr=_fmt(_td);
  var hoyBtn=g('rqHoy');if(hoyBtn)hoyBtn.onclick=function(){setDateRange(todayStr,todayStr);};
  var ayerBtn=g('rqAyer');if(ayerBtn)ayerBtn.onclick=function(){
    var ay=new Date(_td);ay.setDate(ay.getDate()-1);var ays=_fmt(ay);setDateRange(ays,ays);
  };
  var semBtn=g('rqSemana');if(semBtn)semBtn.onclick=function(){
    var lun=new Date(_td);lun.setDate(_td.getDate()-_td.getDay()+((_td.getDay()===0)?-6:1));
    setDateRange(_fmt(lun),todayStr);
  };
  var mesBtn=g('rqMes');if(mesBtn)mesBtn.onclick=function(){
    var ini=new Date(_td.getFullYear(),_td.getMonth(),1);
    setDateRange(_fmt(ini),todayStr);
  };
  var mesAntBtn=g('rqMesAnt');if(mesAntBtn)mesAntBtn.onclick=function(){
    var pm=new Date(_td.getFullYear(),_td.getMonth()-1,1);
    var pme=new Date(_td.getFullYear(),_td.getMonth(),0);
    setDateRange(_fmt(pm),_fmt(pme));
  };

  /* Wire: Excel export */
  var exBtn=g('repExcel');
  if(exBtn)exBtn.onclick=function(){exportarExcel(vs,fromD,toD,isVend);};

  /* Wire: ver detalle */
  g('page').querySelectorAll('[data-vid]').forEach(function(b){
    b.onclick=function(){
      var v=vs.find(function(x){return x.id===b.dataset.vid;});if(!v)return;
      var its=v.productos_vendidos||[];
      var discRow=v.descuento>0?'<div class="list-row" style="color:var(--amber)"><span>Descuento</span><span style="font-family:var(--mono)">- '+fm(v.descuento)+'</span></div>':'';
      modal('Factura #'+String(v.numero_factura||'').padStart(4,'0'),
        '<div class="list-row"><span class="bd bd-m">Cliente</span><strong>'+esc(v.cliente||'—')+'</strong></div>'+
        '<div class="list-row"><span class="bd bd-m">Fecha</span><span style="font-size:12px">'+fd(v.created_at)+'</span></div>'+
        (v.lat&&v.lng?'<div class="list-row"><span class="bd bd-m">📍 GPS</span><a href="https://maps.google.com/?q='+v.lat+','+v.lng+'" target="_blank" style="font-size:12px;color:var(--cyan);font-family:var(--mono)">'+Number(v.lat).toFixed(5)+', '+Number(v.lng).toFixed(5)+'</a></div>':'')+
        '<div class="hr"/>'+
        its.map(function(i){
          var cj=i.cantidad_cajas||0,ud=i.cantidad_unidades||0;
          var pcaja=i.precio_caja||i.precio,punit=i.precio;
          var sub=i.subtotal||(cj*pcaja+ud*punit)||(i.cantidad*i.precio);
          var qDesc=cj>0&&ud>0?cj+' cj + '+ud+' ud':cj>0?cj+(cj===1?' caja':' cajas'):ud+(ud===1?' unidad':' unidades');
          return'<div class="list-row"><div><div style="font-weight:600">'+esc(i.nombre)+'</div>'+
            '<div style="font-size:11px;color:var(--txt3)">'+qDesc+'</div></div>'+
            '<span style="font-family:var(--mono);font-weight:700">'+fm(sub)+'</span></div>';
        }).join('')+
        '<div class="hr"/>'+
        discRow+
        '<div class="list-row" style="margin-top:8px;font-size:18px;font-weight:800;font-family:var(--mono)"><span>TOTAL</span><span style="color:var(--green)">'+fm(v.total)+'</span></div>',
        '<button class="btn ghost sm" id="vClose">Cerrar</button>');
      g('vClose').onclick=closeModal;
    };
  });

  /* Wire: editar */
  g('page').querySelectorAll('[data-edit]').forEach(function(b){
    b.onclick=function(){var v=vs.find(function(x){return x.id===b.dataset.edit;});if(!v)return;openInlineEditor(v);};
  });

  /* Wire: anular venta */
  g('page').querySelectorAll('[data-void]').forEach(function(b){
    b.onclick=async function(){
      var vid2=b.dataset.void;
      var vcli=b.dataset.vcli||'';
      var esAuditoria=vcli.indexOf('(Auditoría)')>=0;
      var v2=vs.find(function(x){return x.id===vid2;});
      if(!v2)return;

      var msg=esAuditoria
        ?'¿Anular esta venta de auditoría?\n\nSe devolverá el stock al inventario del v_inv automáticamente.'
        :'¿Anular esta venta? Esta acción no se puede deshacer.';
      var ok=await ask(msg);
      if(!ok)return;

      /* Anular la venta */
      var r=await db.from('ventas').update({anulada:true}).eq('id',vid2);
      if(r.error){toast('Error al anular: '+r.error.message,'err');return;}

      /* Si es de auditoría → devolver stock a bodega_vendedor del v_inv */
      if(esAuditoria&&v2.user_id&&v2.productos_vendidos){
        var pv=v2.productos_vendidos;
        if(typeof pv==='string'){try{pv=JSON.parse(pv);}catch(e){pv=[];}}
        if(Array.isArray(pv)){
          for(var _pi=0;_pi<pv.length;_pi++){
            var _item=pv[_pi];
            if(!_item.id||_item.id==='manual')continue;
            var _qty=Number(_item.cantidad||0);
            if(_qty<=0)continue;
            /* Buscar registro en bodega_vendedor */
            var _bvR=await db.from('bodega_vendedor')
              .select('id,stock').eq('producto_id',_item.id).eq('vendedor_id',v2.user_id).maybeSingle();
            if(_bvR.data){
              await db.from('bodega_vendedor')
                .update({stock:Math.max(0,Number(_bvR.data.stock||0)+_qty)})
                .eq('id',_bvR.data.id);
            } else {
              await db.from('bodega_vendedor')
                .insert([{producto_id:_item.id,vendedor_id:v2.user_id,empresa_id:S.empresa_id,stock:_qty}]);
            }
          }
          toast('✓ Venta anulada y stock devuelto al v_inv','ok');
        }
      } else {
        toast('✓ Venta anulada','ok');
      }
      histVentas();
    };
  });
}

async function histVentasLoad(fromD,toD,vendFilt,vends){
  g('page').innerHTML='<div class="empty">Cargando…</div>';
  var q;
  if(S.role==='vendedor'){
    q=db.from('ventas').select('id,total,total_bruto,descuento,descuento_tipo,created_at,cliente,cliente_id,user_id,numero_factura,anulada,editada,productos_vendidos').eq('user_id',S.id);
  } else {
    q=db.from('ventas').select('id,total,total_bruto,descuento,descuento_tipo,created_at,cliente,cliente_id,user_id,numero_factura,anulada,editada,productos_vendidos').eq('empresa_id',S.empresa_id);
  }
  var vr=await q;
  var fromTs=fromD?new Date(fromD+'T00:00:00').toISOString():null;
  var toTs=toD?new Date(toD+'T23:59:59').toISOString():null;
  var all=(vr.data||[]).filter(function(v){
    if(v.anulada)return false;
    if(fromTs&&v.created_at<fromTs)return false;
    if(toTs&&v.created_at>toTs)return false;
    if(vendFilt&&v.user_id!==vendFilt)return false;
    return true;
  });
  var costMap={};
  var pr=await db.from('productos').select('id,nombre,costo,unidades_por_caja').eq('empresa_id',S.empresa_id);
  (pr.data||[]).forEach(function(p){var e={costo:p.costo||0,upc:p.unidades_por_caja||1};costMap[p.id]=e;costMap[p.nombre]=e;costMap[(p.nombre||'').toLowerCase()]=e;});
  drawReporte(all,vends||[],fromD,toD,vendFilt,fromD,toD,costMap);
}

function exportarExcel(vs,fromD,toD,isVend){
  if(typeof XLSX==='undefined'){toast('Cargando librería Excel, intenta en un momento…','warn');return;}
  var wb=XLSX.utils.book_new();

  /* ── Hoja 1: Ventas ── */
  var ventasData=[['Folio','Fecha','Cliente','Vendedor','Total Bruto','Descuento','Total Final']];
  vs.forEach(function(v){
    ventasData.push([
      '#'+String(v.numero_factura||'').padStart(4,'0'),
      v.created_at?new Date(v.created_at).toLocaleString('es'):'',
      v.cliente||'Consumidor Final',
      (v.usuarios&&(v.usuarios.nombre||v.usuarios.username))||'—',
      Number(v.total_bruto||v.total||0),
      Number(v.descuento||0),
      Number(v.total||0)
    ]);
  });
  var ws1=XLSX.utils.aoa_to_sheet(ventasData);
  ws1['!cols']=[{wch:10},{wch:20},{wch:25},{wch:20},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Ventas');

  /* ── Hoja 2: Productos vendidos ── */
  var prodData=[['Folio','Fecha','Producto','Cant. Cajas','Cant. Unidades','Cant. Total','Precio Unitario','Precio Caja','Subtotal']];
  vs.forEach(function(v){
    (v.productos_vendidos||[]).forEach(function(p){
      prodData.push([
        '#'+String(v.numero_factura||'').padStart(4,'0'),
        v.created_at?new Date(v.created_at).toLocaleString('es'):'',
        p.nombre||'',
        Number(p.cantidad_cajas||0),
        Number(p.cantidad_unidades||0),
        Number(p.cantidad||0),
        Number(p.precio||0),
        Number(p.precio_caja||0),
        Number(p.subtotal||(p.precio*p.cantidad)||0)
      ]);
    });
  });
  var ws2=XLSX.utils.aoa_to_sheet(prodData);
  ws2['!cols']=[{wch:10},{wch:20},{wch:30},{wch:12},{wch:14},{wch:12},{wch:14},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'Productos Vendidos');

  /* ── Hoja 3: Clientes ── */
  var cltMap={};
  vs.forEach(function(v){
    var k=v.cliente||'Consumidor Final';
    if(!cltMap[k])cltMap[k]={nombre:k,facturas:0,total:0};
    cltMap[k].facturas++;cltMap[k].total+=Number(v.total||0);
  });
  var cltData=[['Cliente','Nº Facturas','Total Comprado']];
  Object.values(cltMap).sort(function(a,b){return b.total-a.total;}).forEach(function(c){
    cltData.push([c.nombre,c.facturas,c.total]);
  });
  var ws3=XLSX.utils.aoa_to_sheet(cltData);
  ws3['!cols']=[{wch:30},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws3,'Clientes');

  /* ── Hoja 4: Arqueo de caja ── */
  var arqueoCols=[['Período','Desde: '+fromD+' — Hasta: '+toD],['',''],
    ['Concepto','Importe'],
    ['Total Ventas (bruto)',vs.reduce(function(s,v){return s+Number(v.total_bruto||v.total||0);},0)],
    ['Total Descuentos',vs.reduce(function(s,v){return s+Number(v.descuento||0);},0)],
    ['Total Cobrado (neto)',vs.reduce(function(s,v){return s+Number(v.total||0);},0)],
    ['',''],
    ['Nº de Facturas',vs.length],
    ['Nº de Clientes únicos',new Set(vs.filter(function(v){return v.cliente&&v.cliente!=='Consumidor Final';}).map(function(v){return v.cliente;})).size],
  ];
  var ws4=XLSX.utils.aoa_to_sheet(arqueoCols);
  ws4['!cols']=[{wch:28},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws4,'Arqueo de Caja');

  /* ── Hoja 5: Resumen por vendedor ── */
  var vendMap={};
  vs.forEach(function(v){
    var uid=(v.usuarios&&v.usuarios.id)||v.user_id||'admin';
    var unom=(v.usuarios&&(v.usuarios.nombre||v.usuarios.username))||'Admin';
    if(!vendMap[uid])vendMap[uid]={nombre:unom,facturas:0,total_bruto:0,descuentos:0,total_neto:0,productos_qty:0};
    vendMap[uid].facturas++;
    vendMap[uid].total_bruto+=Number(v.total_bruto||v.total||0);
    vendMap[uid].descuentos+=Number(v.descuento||0);
    vendMap[uid].total_neto+=Number(v.total||0);
    (v.productos_vendidos||[]).forEach(function(p){vendMap[uid].productos_qty+=Number(p.cantidad||0);});
  });
  var vendSorted=Object.values(vendMap).sort(function(a,b){return b.total_neto-a.total_neto;});
  var totNeto=vendSorted.reduce(function(s,v){return s+v.total_neto;},0);
  var vendData=[['Vendedor','Nº Facturas','Total Bruto','Descuentos','Total Neto','% del Total','Productos Vendidos']];
  vendSorted.forEach(function(v){
    vendData.push([
      v.nombre,
      v.facturas,
      v.total_bruto,
      v.descuentos,
      v.total_neto,
      totNeto>0?Math.round(v.total_neto/totNeto*10000)/100:0,
      v.productos_qty
    ]);
  });
  /* Totals row */
  vendData.push(['','','','','','','']);
  vendData.push([
    'TOTAL',
    vendSorted.reduce(function(s,v){return s+v.facturas;},0),
    vendSorted.reduce(function(s,v){return s+v.total_bruto;},0),
    vendSorted.reduce(function(s,v){return s+v.descuentos;},0),
    totNeto,
    100,
    vendSorted.reduce(function(s,v){return s+v.productos_qty;},0)
  ]);
  var ws5=XLSX.utils.aoa_to_sheet(vendData);
  ws5['!cols']=[{wch:24},{wch:12},{wch:14},{wch:12},{wch:14},{wch:12},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws5,'Resumen por Vendedor');

  var fname='BridgeControl_Reporte_'+fromD+'_'+toD+'.xlsx';
  bcExcelShare(wb,fname);
}

async function estadoCuentaCliente(clt){
  modal('📋 Estado de cuenta — '+esc(clt.nombre),
    '<div class="empty">Cargando…</div>', '');

  /* Cargar ventas del cliente no anuladas */
  var rV=await db.from('ventas')
    .select('id,numero_factura,total,created_at,liquidada,fecha_liquidacion,descuento')
    .eq('empresa_id',S.empresa_id)
    .eq('cliente_id',clt.id)
    .eq('anulada',false)
    .order('created_at',{ascending:false})
    .limit(200);

  var ventas=rV.data||[];
  var hoy=Date.now();
  var diasCred=Number(clt.dias_credito||0);

  /* Clasificar facturas */
  var pendientes=[], vencidas=[], cobradas=[];
  ventas.forEach(function(v){
    if(v.liquidada){cobradas.push(v);return;}
    var fechaVenc=diasCred>0?new Date(v.created_at).getTime()+diasCred*86400000:null;
    var vencida=fechaVenc&&hoy>fechaVenc;
    if(vencida) vencidas.push({v:v,vencHace:Math.floor((hoy-fechaVenc)/86400000)});
    else pendientes.push({v:v,diasRest:fechaVenc?Math.ceil((fechaVenc-hoy)/86400000):null});
  });

  var totalPend=pendientes.reduce(function(s,x){return s+Number(x.v.total||0);},0);
  var totalVenc=vencidas.reduce(function(s,x){return s+Number(x.v.total||0);},0);
  var totalCob=cobradas.reduce(function(s,x){return s+Number(x.v.total||0);},0);
  var totalDeuda=Math.round((totalPend+totalVenc)*100)/100;

  function factRow(v, badge){
    var folio='#'+String(v.numero_factura||'').padStart(4,'0');
    var fecha=new Date(v.created_at).toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'});
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<div>'+
        '<div style="font-size:13px;font-weight:600">'+folio+'</div>'+
        '<div style="font-size:11px;color:var(--txt3)">'+fecha+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<span style="font-family:var(--mono);font-weight:700">'+fm(v.total)+'</span>'+
        badge+
      '</div>'+
    '</div>';
  }

  var html=
    /* KPIs */
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">'+
      '<div style="background:var(--s3);border-radius:8px;padding:12px;text-align:center">'+
        '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:4px">Deuda total</div>'+
        '<div style="font-size:22px;font-weight:900;font-family:var(--mono);color:'+(totalDeuda>0?'#ef4444':'var(--green)')+'">'+fm(totalDeuda)+'</div>'+
      '</div>'+
      '<div style="background:var(--s3);border-radius:8px;padding:12px;text-align:center">'+
        '<div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:4px">Cobrado</div>'+
        '<div style="font-size:22px;font-weight:900;font-family:var(--mono);color:var(--green)">'+fm(totalCob)+'</div>'+
      '</div>'+
      (vencidas.length?
        '<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px;text-align:center;grid-column:span 2">'+
          '<div style="font-size:9px;color:#ef4444;text-transform:uppercase;font-weight:700;margin-bottom:2px">⚠ Facturas vencidas</div>'+
          '<div style="font-size:18px;font-weight:900;font-family:var(--mono);color:#ef4444">'+fm(totalVenc)+' ('+vencidas.length+')</div>'+
        '</div>':'')+
    '</div>'+
    /* Vencidas */
    (vencidas.length?
      '<div style="font-size:11px;font-weight:700;color:#ef4444;text-transform:uppercase;margin-bottom:6px">Facturas vencidas</div>'+
      vencidas.map(function(x){return factRow(x.v,'<span class="bd bd-r" style="font-size:10px">'+x.vencHace+'d vencida</span>');}).join('')+
      '<div style="margin-bottom:12px"></div>'
    :'')+
    /* Pendientes */
    (pendientes.length?
      '<div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;margin-bottom:6px">Pendientes de cobro</div>'+
      pendientes.map(function(x){
        var badge=x.diasRest!=null
          ?'<span class="bd bd-o" style="font-size:10px">vence en '+x.diasRest+'d</span>'
          :'<span class="bd" style="font-size:10px;background:var(--s3)">contado</span>';
        return factRow(x.v,badge);
      }).join('')+
      '<div style="margin-bottom:12px"></div>'
    :(!vencidas.length?'<div class="empty" style="padding:16px;text-align:center">✅ Sin deudas pendientes</div>':'')+
    /* Cobradas */
    (cobradas.length?
      '<div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:6px">Cobradas ('+cobradas.length+')</div>'+
      cobradas.slice(0,5).map(function(v){return factRow(v,'<span class="bd bd-g" style="font-size:10px">✓ Cobrada</span>');}).join('')+
      (cobradas.length>5?'<div style="font-size:11px;color:var(--txt3);padding:6px 0">...y '+(cobradas.length-5)+' más</div>':'')
    :''));

  g('mbody').innerHTML=html;
  g('mft').innerHTML='<button class="btn ghost sm" onclick="closeModal()">Cerrar</button>';
}

  var ctab=g('page').querySelectorAll('[data-cta]');

  for(var i=0;i<dcb.length;i++){(function(b){b.onclick=async function(){var ok=await ask('¿Eliminar?');if(!ok)return;await db.from('clientes').delete().eq('id',b.dataset.dc);toast('Eliminado','ok');await loadClts();drawClts(cache.clts,'');};})(dcb[i]);}

/* ══ LIQUIDACIÓN DE MOTORISTAS ══ */
async function liquidarMotorista(vendId, vendNom){
  /* Fechas: por defecto semana actual lunes-hoy */
  var hoy=new Date();
  var diaSemana=hoy.getDay()||7; /* 1=lun … 7=dom */
  var lunes=new Date(hoy); lunes.setDate(hoy.getDate()-(diaSemana-1));
  var lunes_str=lunes.toISOString().slice(0,10);
  var hoy_str=hoy.toISOString().slice(0,10);

  modal('💵 Liquidar — '+esc(vendNom),
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">'+
      '<div class="fld"><label>Desde</label><input type="date" id="liqDesde" value="'+lunes_str+'"/></div>'+
      '<div class="fld"><label>Hasta</label><input type="date" id="liqHasta" value="'+hoy_str+'"/></div>'+
    '</div>'+
    '<div class="fld"><label>% Comisión a aplicar</label>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        '<input type="number" id="liqPct" min="0" max="100" step="0.5" placeholder="Ej: 10" style="width:100px"/>'+
        '<span style="font-size:12px;color:var(--txt3)">% sobre ventas netas</span>'+
      '</div>'+
    '</div>'+
    '<div id="liqPreview" style="background:var(--s3);border-radius:10px;padding:12px;margin-top:6px;font-size:12px;color:var(--txt3);text-align:center">'+
      'Ingresa el periodo y porcentaje para calcular'+
    '</div>',
    '<button class="btn ghost sm" id="liqCancel">Cancelar</button>'+
    '<button class="btn sl sm" id="liqCalc">🔍 Calcular</button>'+
    '<button class="btn g sm" id="liqConfirm" disabled>✓ Confirmar y Generar</button>'
  );

  g('liqCancel').onclick=closeModal;

  var _liqData=null; /* guardará resultados del cálculo */

  g('liqCalc').onclick=async function(){
    var desde=g('liqDesde').value;
    var hasta=g('liqHasta').value;
    var pct=parseFloat(g('liqPct').value);
    if(!desde||!hasta){toast('Selecciona el rango de fechas','err');return;}
    if(isNaN(pct)||pct<=0){toast('Ingresa un porcentaje válido','err');return;}
    if(desde>hasta){toast('La fecha inicial debe ser menor a la final','err');return;}

    _liqData=null;
    g('liqConfirm').disabled=true;
    g('liqCalc').disabled=true; g('liqCalc').textContent='⏳ Calculando…';
    try{

    /* BUG3 FIX: usar medianoche local convertida a UTC para no perder ventas por timezone */
    var desdeDate=new Date(desde+'T00:00:00');
    var hastaDate=new Date(hasta+'T23:59:59');
    var desdeISO=desdeDate.toISOString();
    var hastaISO=hastaDate.toISOString();
    /* Si super_admin no filtra por empresa — ve todas las ventas del vendedor */
    var _liqQ=db.from('ventas')
      .select('id,total,created_at,numero_factura,anulada,liquidada')
      .eq('user_id',vendId)
      .gte('created_at',desdeISO)
      .lte('created_at',hastaISO)
      .order('created_at',{ascending:true});
    if(S.empresa_id) _liqQ=_liqQ.eq('empresa_id',S.empresa_id);
    var vr=await _liqQ;

    var ventas=vr.data||[];

    /* BUG2 FIX: clasificar correctamente — ya-liquidadas no van al bruto */
    var ventasValidas =ventas.filter(function(v){return !v.anulada&&!v.liquidada;});
    var ventasAnuladas=ventas.filter(function(v){return  v.anulada;});
    var ventasYaLiq   =ventas.filter(function(v){return !v.anulada&& v.liquidada;});

    /* BUG2 FIX: bruto = solo ventas válidas + anuladas del periodo (no ya-liquidadas) */
    var ventasPeriodo=ventas.filter(function(v){return !v.liquidada;});
    var totalBruto=ventasPeriodo.reduce(function(s,v){
      return Math.round((s+Math.max(0,Number(v.total)||0))*100)/100; /* BUG1: round cada paso */
    },0);
    var totalNeto=ventasValidas.reduce(function(s,v){
      return Math.round((s+Math.max(0,Number(v.total)||0))*100)/100; /* BUG1+BUG4: NaN→0 */
    },0);

    /* BUG1 FIX: calcular comisión en centavos para evitar float drift */
    var comisionCentavos=Math.round(totalNeto*100) * pct / 100;
    var comision=Math.round(comisionCentavos)/100;

    _liqData={
      vendId:vendId, vendNom:vendNom,
      desde:desde, hasta:hasta, pct:pct,
      ventas:ventasValidas,
      totalFacturas:ventasValidas.length,
      anuladas:ventasAnuladas.length,
      yaLiquidadas:ventasYaLiq.length,
      totalBruto:totalBruto,
      totalNeto:totalNeto,
      comision:comision
    };

    /* Preview en el modal */
    var prevHtml=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
        '<div style="text-align:center"><div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Facturas válidas</div>'+
          '<div style="font-size:20px;font-weight:800;color:var(--cyan)">'+ventasValidas.length+'</div></div>'+
        '<div style="text-align:center"><div style="font-size:9px;color:var(--txt3);text-transform:uppercase">Anuladas</div>'+
          '<div style="font-size:20px;font-weight:800;color:var(--red)">'+ventasAnuladas.length+'</div></div>'+
      '</div>'+
      '<div style="border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px">'+
        '<div style="display:flex;justify-content:space-between"><span style="color:var(--txt3)">Total bruto:</span><span style="font-family:var(--mono)">'+fm(totalBruto)+'</span></div>'+
        (ventasAnuladas.length?'<div style="display:flex;justify-content:space-between"><span style="color:var(--red)">Anuladas (-):</span><span style="font-family:var(--mono);color:var(--red)">-'+fm(totalBruto-totalNeto)+'</span></div>':'')+
        (ventasYaLiq.length?'<div style="font-size:10px;color:var(--amber)">⚠ '+ventasYaLiq.length+' venta(s) ya liquidadas excluidas</div>':'')+
        '<div style="display:flex;justify-content:space-between;font-weight:700"><span>Ventas netas:</span><span style="font-family:var(--mono);color:var(--green)">'+fm(totalNeto)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;border-top:1px solid var(--border);padding-top:6px;margin-top:4px">'+
          '<span>Comisión ('+pct+'%):</span><span style="font-family:var(--mono);color:var(--cyan)">'+fm(comision)+'</span>'+
        '</div>'+
      '</div>';

    g('liqPreview').innerHTML=prevHtml;
    g('liqConfirm').disabled=ventasValidas.length===0;
    }catch(err){
      toast('Error al calcular: '+(err.message||'intenta de nuevo'),'err');
      g('liqPreview').innerHTML='<div style="color:#ef4444;text-align:center;font-size:12px">⚠ Error al consultar datos. Verifica tu conexión.</div>';
    }
    g('liqCalc').disabled=false; g('liqCalc').textContent='🔍 Calcular';
  };

  g('liqConfirm').onclick=async function(){
    if(!_liqData||!_liqData.ventas.length){toast('Calcula primero el periodo','warn');return;}
    var ok=await ask('Confirmar liquidacion de '+_liqData.vendNom+' por '+fm(_liqData.comision)+'. Las '+_liqData.totalFacturas+' ventas quedaran marcadas como liquidadas.');
    if(!ok) return;

    /* BUG4 FIX: marcar liquidadas con verificación de errores por lote */
    var ids=_liqData.ventas.map(function(v){return v.id;});
    var fechaLiq=new Date().toISOString();
    var batchErrors=0;
    for(var i=0;i<ids.length;i+=50){
      var batch=ids.slice(i,i+50);
      var br=await db.from('ventas').update({liquidada:true,fecha_liquidacion:fechaLiq}).in('id',batch);
      if(br.error) batchErrors++;
    }
    if(batchErrors>0){
      toast('Advertencia: '+batchErrors+' lote(s) no se marcaron. Verifica en Supabase.','warn');
    }
    closeModal();
    /* Generar reporte imprimible solo si todos los lotes pasaron */
    _printLiquidacion(_liqData);
  };
}

async function adminVendedores(){
  tbactSet('')
  var isSA=S.role==='super_admin';
  var empR=S.empresa_id
    ? await db.from('empresas').select('plan,max_vendedores').eq('id',S.empresa_id).maybeSingle()
    : {data:null};
  var maxV=(empR.data&&empR.data.max_vendedores)||999;
  var planN=(empR.data&&empR.data.plan)||'elite';
  var planLbl={basico:'Básico',estandar:'Estándar',pro:'Pro',custom:'Personalizado',elite:'Elite ⭐'}[planN]||planN;

  /* Super admin ve todos los vendedores de todas las empresas */
  var vrQ=db.from('usuarios').select('*').in('role',['vendedor','v_inv']).order('username',{ascending:true});
  if(!isSA) vrQ=vrQ.eq('empresa_id',S.empresa_id);
  var vr=await vrQ;
  var vs=vr.data||[];
  cache.empPlan=planN;
  var canAdd=vs.length<maxV;
  tbactSet(canAdd
    ?'<button class="btn g sm" id="btnAV">＋ Vendedor</button>'
    :'<span style="font-size:12px;color:var(--amber);font-weight:600">Límite alcanzado — Contacta soporte para ampliar</span>'
  );
  var isElite=(planN==='elite');
  var rows=vs.map(function(v){
    var tipoBadge=v.role==='v_inv'?'<span style="font-size:9px;font-weight:700;background:rgba(245,158,11,0.18);color:var(--amber);border-radius:6px;padding:1px 6px;margin-left:4px">INV</span>':'';
    var comBadge=isElite?'<td style="font-family:var(--mono);color:var(--cyan);text-align:center">'+(v.comision_pct!=null?v.comision_pct+'%':'—')+'</td>':'';
    return'<tr><td><strong>'+esc(v.nombre)+'</strong>'+tipoBadge+'</td>'+
      '<td style="font-family:var(--mono)">'+esc(v.username)+'</td>'+
      '<td style="font-family:var(--mono);color:var(--txt3)">'+esc(v.password)+'</td>'+
      comBadge+
      '<td><div style="display:flex;gap:4px;flex-wrap:wrap">'+
        '<button class="btn sl xs" data-ev="'+v.id+'">✏</button>'+
        '<button class="btn g xs" data-liq="'+v.id+'" data-liqnom="'+esc(v.nombre||v.username)+'">💵</button>'+
        '<button class="btn r xs" data-dv="'+v.id+'">🗑</button>'+
      '</div></td></tr>';
  }).join('');
  var usedPct=Math.round((vs.length/maxV)*100);
  var comHeader=isElite?'<th style="text-align:center">% Comisión</th>':'';
  var colSpan=isElite?5:4;
  g('page').innerHTML=
    '<div class="panel"><div class="ph">'+
    '<div class="ptitle">Vendedores — '+vs.length+' / '+maxV+'</div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    (isElite?'<button class="btn sl sm" id="btnComReport">💰 Reporte Comisiones</button>':'')+
    '<span class="plan-badge plan-'+planN+'">'+planLbl+'</span></div></div>'+
    '<div style="margin:0 14px 12px;background:var(--s3);border-radius:8px;height:6px;overflow:hidden">'+
      '<div style="height:100%;width:'+usedPct+'%;background:'+(usedPct>=100?'var(--red)':usedPct>=80?'var(--amber)':'var(--cyan)')+';border-radius:8px;transition:width .4s"></div>'+
    '</div>'+
    '<div class="twrap"><table><thead><tr><th>Nombre</th><th>Usuario</th><th>Contraseña</th>'+comHeader+'<th></th></tr></thead>'+
    '<tbody>'+(rows||'<tr><td colspan="'+colSpan+'" class="empty">Sin vendedores</td></tr>')+'</tbody></table></div></div>';
  var addBtn=g('btnAV');
  if(addBtn)addBtn.onclick=function(){
    if(vs.length>=maxV){toast('Límite de vendedores alcanzado. Contacta soporte.','warn');return;}
    formVend();
  };
  var evb=g('page').querySelectorAll('[data-ev]'),dvb=g('page').querySelectorAll('[data-dv]');
  for(var i=0;i<evb.length;i++){(function(b){b.onclick=function(){formVend(vs.find(function(v){return v.id===b.dataset.ev;}));};})(evb[i]);}
  for(var i=0;i<dvb.length;i++){(function(b){b.onclick=async function(){var ok=await ask('¿Eliminar vendedor?');if(!ok)return;await db.from('usuarios').delete().eq('id',b.dataset.dv);toast('Eliminado','ok');adminVendedores();};})(dvb[i]);}
  var crBtn=g('btnComReport');
  if(crBtn)crBtn.onclick=function(){reporteComisiones(vs);};

  /* Wire liquidacion buttons */
  g('page').querySelectorAll('[data-liq]').forEach(function(b){
    b.onclick=function(){ liquidarMotorista(b.dataset.liq, b.dataset.liqnom); };
  });
}
function formVend(v){
  var ed=!!v;
  var empPlan=typeof cache.empPlan!=='undefined'?cache.empPlan:'basico';
  var showTipo=(empPlan==='pro'||empPlan==='custom'||empPlan==='elite')&&!ed;
  var showComision=(empPlan==='elite');
  var tipoSel=showTipo?
    '<div class="fld"><label>Tipo de vendedor</label>'+
    '<select id="fvTipo" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:8px;font-size:13px;width:100%;outline:none">'+
      '<option value="vendedor">🧾 Vendedor Normal (POS y facturación)</option>'+
      '<option value="v_inv">📦 Vendedor Inventario (solo bodega, sin precios)</option>'+
    '</select></div>':'';
  modal(ed?'Editar Vendedor':'Nuevo Vendedor',
    '<div class="fld"><label>Nombre *</label><input id="fvN" value="'+esc(v&&v.nombre||'')+'" '+(ed?'':'oninput="autoUsuario(\'fvN\',\'fvU\',\'fvP\')"')+'/></div>'+
    '<div class="fld"><label>Usuario '+(ed?'':'<span class="hint">✦ AUTO</span>')+'</label><input id="fvU" value="'+esc(v&&v.username||'')+'" style="color:var(--cyan)" '+(ed?'':'readonly')+'/></div>'+
    '<div class="fld"><label>Contraseña</label><input id="fvP" value="'+esc(v&&v.password||'')+'" style="color:var(--cyan)"/></div>'+tipoSel+
    (showComision?'<div class="fld"><label>💰 % Comisión <span class="hint">Solo plan Elite</span></label>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<input id="fvCom" type="number" min="0" max="100" step="0.5" value="'+(v&&v.comision_pct!=null?v.comision_pct:'')+
          '" placeholder="Ej: 10" style="width:100px"/>'+
        '<span style="font-size:13px;color:var(--txt3)">% — si vende 1000 → cobra '+
          '<span id="fvComCalc">0</span></span>'+
      '</div>'+
    '</div>':''),
    '<button class="btn ghost sm" id="fvC">Cancelar</button><button class="btn g sm" id="fvOk">'+(ed?'Actualizar':'Crear')+'</button>');
  g('fvC').onclick=closeModal;
  /* Live comision calculator */
  if(showComision&&g('fvCom')){
    g('fvCom').oninput=function(){
      var pct=parseFloat(this.value)||0;
      var calc=g('fvComCalc');
      if(calc)calc.textContent=(1000*pct/100).toFixed(2);
    };
    /* trigger once with existing value */
    var evt=new Event('input');g('fvCom').dispatchEvent(evt);
  }
  g('fvOk').onclick=async function(){
    var n=g('fvN').value.trim(),u=g('fvU').value.trim(),p=g('fvP').value.trim();
    if(!n||!u||!p){toast('Todos los campos son requeridos','err');return;}
    var tipoRole=showTipo&&g('fvTipo')?(g('fvTipo').value||'vendedor'):(v&&v.role||'vendedor');
    var comPct=showComision&&g('fvCom')&&g('fvCom').value!==''?parseFloat(g('fvCom').value):null;
    var pl={nombre:n,username:u,password:p,role:tipoRole,empresa_id:S.empresa_id};
    if(showComision)pl.comision_pct=comPct;
    var r=ed?await db.from('usuarios').update(pl).eq('id',v.id):await db.from('usuarios').insert([pl]);
    if(r.error){toast('Error: '+(r.error.message||JSON.stringify(r.error)),'err');return;}
    if(ed){toast('Actualizado','ok');closeModal();adminVendedores();}
    else{
      closeModal();adminVendedores();
      var isInvRole=tipoRole==='v_inv';
      var waTxt=(isInvRole?'¡Bienvenido a Bridge Control! 📦\n\nHola '+n+', tienes acceso al módulo de Inventario:\n\n':'¡Bienvenido a Bridge Control! 🎉\n\nHola '+n+', tus credenciales son:\n\n')+'👤 Usuario: '+u+'\n🔑 Contraseña: '+p+'\n\n🌐 Accede en: '+getAppUrl()+'\n\n¡Gracias por ser parte del equipo!';
      modal('✅ Vendedor creado',
        '<div style="text-align:center;padding:16px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:12px;margin-bottom:14px"><div style="font-size:32px">🎉</div><div style="font-weight:700;color:var(--green);font-size:16px">¡'+esc(n)+' ya puede ingresar!</div></div>'+
        '<div class="creds-card"><div class="ct">Credenciales</div>'+
        '<div class="creds-row"><span class="lbl">👤 Usuario</span><span class="val">'+esc(u)+'</span></div>'+
        '<div class="creds-row"><span class="lbl">🔑 Contraseña</span><span class="val">'+esc(p)+'</span></div></div>',
        '<button class="btn ghost sm" id="waClose">Cerrar</button><button class="btn g" id="waShare">💬 WhatsApp</button>');
      g('waClose').onclick=closeModal;
      g('waShare').onclick=function(){window.open('https://wa.me/?text='+encodeURIComponent(waTxt),'_blank');};
    }
  };
}

/* ══ REPORTE COMISIONES (Elite) ══ */
async function reporteComisiones(vendedores){
  var hoy=new Date();
  var primerDia=new Date(hoy.getFullYear(),hoy.getMonth(),1).toISOString().slice(0,10);
  var ultimoDia=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).toISOString().slice(0,10);

  modal('💰 Reporte de Comisiones',
    '<div class="g2" style="margin-bottom:12px">'+
      '<div class="fld"><label>Desde</label><input type="date" id="comFrom" value="'+primerDia+'"/></div>'+
      '<div class="fld"><label>Hasta</label><input type="date" id="comTo" value="'+ultimoDia+'"/></div>'+
    '</div>'+
    '<div id="comResult"><div class="empty">Selecciona el período y consulta</div></div>',
    '<button class="btn ghost sm" id="comClose">Cerrar</button>'+
    '<button class="btn sl sm" id="comSearch">🔍 Consultar</button>'+
    '<button class="btn g sm" id="comExport" style="display:none">⬇ Excel</button>'
  );
  g('comClose').onclick=closeModal;

  var lastData=[];

  g('comSearch').onclick=async function(){
    var from=g('comFrom').value,to=g('comTo').value;
    if(!from||!to){toast('Selecciona el período','warn');return;}
    g('comResult').innerHTML='<div class="empty">Calculando…</div>';
    var r=await db.from('ventas').select('total,user_id')
      .eq('empresa_id',S.empresa_id)
      .gte('created_at',from+'T00:00:00')
      .lte('created_at',to+'T23:59:59');
    var vs=r.data||[];

    /* Agrupar por vendedor */
    var map={};
    vs.forEach(function(v){
      var uid=v.user_id||'admin';
      var udat=v.usuarios||{};
      var nom=udat.nombre||udat.username||'Admin';
      var pct=udat.comision_pct!=null?Number(udat.comision_pct):null;
      if(!map[uid])map[uid]={nombre:nom,pct:pct,total:0,facturas:0};
      map[uid].total+=Number(v.total||0);
      map[uid].facturas++;
    });

    /* También agregar vendedores sin ventas en el período */
    (vendedores||[]).forEach(function(vd){
      if(!map[vd.id])map[vd.id]={nombre:vd.nombre||vd.username,pct:vd.comision_pct!=null?Number(vd.comision_pct):null,total:0,facturas:0};
    });

    var lista=Object.values(map).sort(function(a,b){return b.total-a.total;});
    lastData=lista;

    var totalGeneral=lista.reduce(function(s,x){return s+x.total;},0);
    var totalComisiones=lista.reduce(function(s,x){return s+(x.pct!=null?x.total*x.pct/100:0);},0);

    var rows=lista.map(function(x){
      var comVal=x.pct!=null?(x.total*x.pct/100):null;
      return '<tr>'+
        '<td><strong>'+esc(x.nombre)+'</strong></td>'+

function bulkImport(){
  if(typeof XLSX==='undefined'){toast('Librería Excel cargando, intenta en un momento…','warn');return;}

  modal('📥 Carga Masiva de Productos',
    '<div style="margin-bottom:14px">'+
    '<div style="font-size:12px;color:var(--txt3);margin-bottom:10px">Descarga la plantilla Excel, llénala y súbela. El sistema calculará precios automáticamente.</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
      '<button class="btn sl sm" id="dlTpl">⬇ Descargar plantilla .xlsx</button>'+
    '</div>'+
    '<div class="warn-bar" style="margin-bottom:12px">'+
      '⚠ <strong>Nombre</strong> es obligatorio. '+
      '<strong>Unidades_por_caja</strong> define cuántas unidades tiene cada caja. '+
      '<strong>Costo</strong> es el precio que pagas por caja. '+
      '<strong>Margen %</strong> calcula el precio de venta automáticamente.'+
    '</div>'+
    '<div class="fld"><label>Subir archivo Excel (.xlsx) o CSV</label>'+
      '<input type="file" id="xlsxFile" accept=".xlsx,.xls,.csv" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:8px 11px;font-size:13px;width:100%"/>'+
    '</div>'+
    '<div id="xlsxPreview"></div>',
    '<button class="btn ghost sm" id="blkCancel">Cancelar</button>'+
    '<button class="btn g sm" id="blkOk" disabled>✓ Importar productos</button>');

  var parsedRows=[];
  g('blkCancel').onclick=closeModal;

  /* ── Descargar plantilla XLSX ── */
  g('dlTpl').onclick=async function(){
    var wb=XLSX.utils.book_new();

    /* Cabeceras con formato claro */
    var headers=[
      'Nombre',
      'Categoria',
      'Descripcion',
      'Unidades_por_caja',
      'Stock_inicial_cajas',
      'Stock_inicial_unidades_sueltas',
      'Costo_por_caja',
      'Margen_porcentaje'
    ];

    /* Filas de ejemplo */
    var ejemplos=[
      ['Coca Cola 350ml','BEBIDAS','Refresco lata 350ml',24,10,0,25.00,35],
      ['Agua Natural 500ml','BEBIDAS','Agua purificada',24,20,6,8.00,40],
      ['Galletas Oreo','SNACKS','Paquete 6 galletas',12,5,0,18.00,30],
      ['Jugo Naranja 1L','JUGOS','',6,8,2,30.00,25]
    ];

    var data=[headers].concat(ejemplos);
    var ws=XLSX.utils.aoa_to_sheet(data);

    /* Ancho de columnas */
    ws['!cols']=[
      {wch:22},{wch:14},{wch:24},{wch:18},
      {wch:20},{wch:26},{wch:16},{wch:18}
    ];

    /* Estilo de cabecera — fondo amarillo (solo soportado por algunos visores) */
    headers.forEach(function(_,i){
      var cell=XLSX.utils.encode_cell({r:0,c:i});
      if(!ws[cell]) return;
      ws[cell].s={font:{bold:true},fill:{fgColor:{rgb:'FFF59D'}}};
    });

    /* Hoja de instrucciones */
    var instrData=[
      ['INSTRUCCIONES DE USO — Bridge Control'],
      [''],
      ['Campo','Tipo','Descripción','Ejemplo'],
      ['Nombre','Texto (obligatorio)','Nombre del producto','Coca Cola 350ml'],
      ['Categoria','Texto','Categoría para agrupar productos','BEBIDAS'],
      ['Descripcion','Texto','Descripción adicional (opcional)','Refresco en lata'],
      ['Unidades_por_caja','Número entero','Cuántas unidades trae cada caja','24'],
      ['Stock_inicial_cajas','Número entero','Cuántas CAJAS tienes en bodega ahora','10'],
      ['Stock_inicial_unidades_sueltas','Número entero','Unidades sueltas adicionales','3'],
      ['Costo_por_caja','Número decimal','Precio que PAGAS por cada caja','25.00'],
      ['Margen_porcentaje','Número entero','% de ganancia sobre el costo','35'],
      [''],
      ['NOTA: El sistema calculará automáticamente el precio de venta por caja y por unidad.'],
      ['NOTA: Si Unidades_por_caja = 1, el sistema asume venta por unidad individual.']
    ];
    var wsI=XLSX.utils.aoa_to_sheet(instrData);
    wsI['!cols']=[{wch:32},{wch:20},{wch:40},{wch:20}];

    XLSX.utils.book_append_sheet(wb,ws,'Productos');
    XLSX.utils.book_append_sheet(wb,wsI,'Instrucciones');

    var fname='plantilla_productos_bridge_control.xlsx';

    /* Android: compartir como archivo */
    var wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    var blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

    if(navigator.canShare){
      try{
        var file=new File([blob],fname,{type:blob.type});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:'Plantilla Bridge Control'});
          return;
        }
      }catch(e){if(e.name==='AbortError')return;}
    }

    /* Desktop: descarga directa */
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
    toast('Plantilla Excel descargada ✓','ok');
  };

  /* ── Leer archivo subido (XLSX o CSV) ── */
  g('xlsxFile').onchange=function(ev){
    var file=ev.target.files[0]; if(!file) return;
    var reader=new FileReader();

    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]]; /* primera hoja */
        var raw=XLSX.utils.sheet_to_json(ws,{defval:''});

        if(!raw.length){toast('El archivo está vacío o sin datos','err');return;}

        /* Normalizar headers — case insensitive, sin espacios ni tildes */
        function norm(s){
          return String(s||'').toLowerCase()
            .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i')
            .replace(/ó/g,'o').replace(/ú/g,'u').replace(/\s+/g,'_')
            .replace(/[^a-z0-9_]/g,'');
        }

        /* Mapa de columnas conocidas → campo interno */
        var COL_MAP={
          'nombre':'nombre',
          'name':'nombre',
          'categoria':'categoria',
          'category':'categoria',
          'descripcion':'descripcion',
          'description':'descripcion',
          'unidades_por_caja':'upc',
          'unidades_x_caja':'upc',
          'upc':'upc',
          'units_per_box':'upc',
          'stock_inicial_cajas':'stock_cajas',
          'stock_cajas':'stock_cajas',
          'cajas':'stock_cajas',
          'boxes':'stock_cajas',
          'stock_inicial_unidades_sueltas':'stock_ud',
          'stock_unidades':'stock_ud',
          'unidades_sueltas':'stock_ud',
          'costo_por_caja':'costo',
          'costo':'costo',
          'cost':'costo',
          'precio_costo':'costo',
          'margen_porcentaje':'margen',
          'margen':'margen',
          'margin':'margen',
          'margen_pct':'margen',
          'stock':'stock_total'
        };

        parsedRows=[];
        var errs=[];

        raw.forEach(function(row,ri){
          /* Normalizar keys del objeto */
          var nRow={};
          Object.keys(row).forEach(function(k){
            var nk=norm(k);
            var mapped=COL_MAP[nk]||nk;
            nRow[mapped]=String(row[k]||'').trim();
          });

          if(!nRow.nombre){errs.push('Fila '+(ri+2)+': sin nombre, ignorada');return;}

          var upc  =Math.max(1,parseInt(nRow.upc)||1);
          var stCj =Math.max(0,parseInt(nRow.stock_cajas)||0);
          var stUd =Math.max(0,parseInt(nRow.stock_ud)||0);
          var stTot=nRow.stock_total?Math.max(0,parseInt(nRow.stock_total)||0):stCj*upc+stUd;
          var costo=Math.max(0,parseFloat(nRow.costo)||0);
          var margen=Math.max(0,parseFloat(nRow.margen)||0);
          var pCaja=costo>0&&margen>0 ? parseFloat((costo*(1+margen/100)).toFixed(2)) : 0;
          var pUnit =upc>0 ? parseFloat((pCaja/upc).toFixed(4)) : pCaja;

          parsedRows.push({
            nombre     :nRow.nombre,
            categoria  :nRow.categoria||null,
            stock      :stTot,
            costo      :costo,
            margen     :margen,
            precio_venta:pUnit,
            precio_caja :pCaja,
            unidades_por_caja:upc,
            empresa_id :S.empresa_id
          });
        });

        /* Preview */
        var prev='<div style="margin-top:12px;font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">'+
          parsedRows.length+' productos listos'+
          (errs.length?' &nbsp;·&nbsp; <span style="color:var(--amber)">'+errs.length+' filas ignoradas</span>':'')+
        '</div>';

        if(errs.length){
          prev+='<div style="font-size:11px;color:var(--amber);margin-bottom:8px">'+errs.slice(0,3).join('<br>')+(errs.length>3?'<br>…y '+(errs.length-3)+' más':'')+'</div>';
        }

        if(parsedRows.length){
          prev+='<div class="twrap" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">'+
            '<table><thead><tr>'+
              '<th>Nombre</th><th>Cat.</th><th>U/Cj</th><th>Stock</th><th>Costo/cj</th><th>P.Caja</th><th>P.Unidad</th>'+
            '</tr></thead><tbody>'+
            parsedRows.slice(0,10).map(function(r){
              var upc=r.unidades_por_caja;
              var stCj=Math.floor(r.stock/upc);
              var stUd=r.stock%upc;
              var stLbl=upc>1?(stCj>0?stCj+'cj':'')+' '+(stUd>0?stUd+'u':''):r.stock+'u';
              return '<tr>'+
                '<td>'+esc(r.nombre)+'</td>'+
                '<td style="color:var(--txt3)">'+esc(r.categoria||'—')+'</td>'+
                '<td style="color:var(--cyan);font-weight:700;text-align:center">'+upc+'</td>'+
                '<td style="text-align:center">'+stLbl.trim()+'</td>'+
                '<td style="font-family:var(--mono)">'+fm(r.costo)+'</td>'+
                '<td style="font-family:var(--mono);color:var(--amber)">'+fm(r.precio_caja)+'</td>'+
                '<td style="font-family:var(--mono);color:var(--green)">'+fm(r.precio_venta)+'</td>'+
              '</tr>';
            }).join('')+
            (parsedRows.length>10?'<tr><td colspan="7" class="empty">…y '+(parsedRows.length-10)+' más</td></tr>':'')+
            '</tbody></table></div>';
          g('blkOk').disabled=false;
        }

        g('xlsxPreview').innerHTML=prev;
      }catch(ex){
        toast('Error al leer el archivo: '+ex.message,'err');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── Importar ── */
  g('blkOk').onclick=async function(){
    if(!parsedRows.length) return;
    g('blkOk').disabled=true; g('blkOk').textContent='⏳ Importando…';
    var ok=0,errMsgs=[];
    /* Insertar de uno en uno para capturar errores específicos */
    for(var i=0;i<parsedRows.length;i++){
      var row=parsedRows[i];
      var r=await db.from('productos').insert([row]);
      if(r.error){
        errMsgs.push('Fila '+(i+1)+' ('+row.nombre+'): '+r.error.message);
      } else {
        ok++;
      }
    }
    if(errMsgs.length){
      toast(ok+' importados · '+errMsgs.length+' errores','warn');
      /* Mostrar detalle de errores */
      var errDetail=errMsgs.slice(0,3).join(' | ')+(errMsgs.length>3?' y '+(errMsgs.length-3)+' más':'');
      setTimeout(function(){toast(errDetail,'err');},1500);
    } else {
      toast(ok+' producto(s) importados ✓','ok');
    }
    closeModal();
    await loadProds();
    pintarInv(cache.prods,'');
  };
}

          '</div>';

        /* Wire qty inputs */
        for(var i=0;i<editItems.length;i++){
          (function(idx){
            var inp=g('eit_'+idx);
            if(inp)inp.oninput=function(){editItems[idx].cantidad=parseInt(inp.value)||1;};
          })(i);
        }
        /* Wire remove */
        for(var i=0;i<editItems.length;i++){
          (function(idx){
            var btn=g('eir_'+idx);
            if(btn)btn.onclick=function(){editItems.splice(idx,1);renderEditItems();};
          })(i);
        }
        /* Wire add */
        g('eAddBtn').onclick=function(){
          var sel=g('eAddSel');
          var pid=sel.value; if(!pid) return;
          var prod=allProds.find(function(p){return p.id===pid;});
          if(!prod) return;
          editItems.push({id:prod.id,nombre:prod.nombre,cantidad:1});
          renderEditItems();
        };
      }

      modal('✏ Editar pedido','',
        '<button class="btn ghost sm" id="eiCancel">Cancelar</button>'+
        '<button class="btn g sm" id="eiSave">Guardar cambios</button>');
      g('mtitle').textContent='✏ Editar pedido — '+esc(vnom);
      renderEditItems();

      g('eiCancel').onclick=closeModal;
      g('eiSave').onclick=async function(){
        if(!editItems.length){toast('El pedido no puede quedar vacío','warn');return;}
        var r=await db.from('pedidos').update({items:editItems}).eq('id',p.id);
        if(r.error){toast('Error: '+r.error.message,'err');return;}
        toast('Pedido actualizado','ok');
        closeModal();
        adminPedidos();
      };
    };
  });

  /* Cargar al inventario del vendedor */
  g('page').querySelectorAll('[data-load]').forEach(function(b){
    b.onclick=async function(){
      var p=pes.find(function(x){return x.id===b.dataset.load;}); if(!p) return;
      var vnom=(p.usuarios&&(p.usuarios.nombre||p.usuarios.username))||'—';
      var vid=p.usuario_id||p.vendedor_id||(p.usuarios&&p.usuarios.id);

      /* Load central stock to check availability */
      var prodsR=await db.from('productos').select('id,nombre,stock').eq('empresa_id',S.empresa_id);
      var prods=prodsR.data||[];

      /* Build editable items list - copy so we don't mutate original */
      var editItems=(p.items||[]).map(function(it){return{id:it.id,nombre:it.nombre,cantidad:it.cantidad};});

      function buildModalBody(){
        var rows=editItems.map(function(it,i){
          var prod=prods.find(function(x){return x.nombre===it.nombre||x.id===it.id;});
          var disp=prod?prod.stock:0;
          var upc=it.upc||1;
          var initCj=it.cj||0; var initUd=it.ud||0;
          /* fallback si viene de pedido antiguo sin cj/ud */
          if(!initCj&&!initUd&&it.cantidad){initUd=it.cantidad;}
          var inpSm='width:100%;background:var(--s2);border:1.5px solid var(--cyan);border-radius:var(--r);color:var(--cyan);font-size:16px;font-weight:800;font-family:var(--mono);text-align:center;padding:6px 4px;outline:none';
          return '<div style="background:var(--s2);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)">'+
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
              '<div>'+
                '<div style="font-size:13px;font-weight:700">'+esc(it.nombre)+'</div>'+
                '<div style="font-size:11px;color:var(--txt3)">'+
                  (disp>0?'📦 Stock central: '+disp+' uds':'⚠ Sin stock central')+
                  (upc>1?' · '+upc+' u/cj':'')+
                '</div>'+
              '</div>'+
              '<button style="background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;padding:0 6px;line-height:1" id="lddel_'+i+'">✕</button>'+
            '</div>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
              '<div>'+
                '<div style="font-size:10px;color:var(--txt3);text-transform:uppercase;font-weight:700;margin-bottom:4px;letter-spacing:.5px">Cajas</div>'+
                '<input type="number" min="0" id="ldcj_'+i+'" value="'+initCj+'" style="'+inpSm+'" onfocus="this.select()"/>'+
              '</div>'+
              '<div>'+
                '<div style="font-size:10px;color:var(--txt3);text-transform:uppercase;font-weight:700;margin-bottom:4px;letter-spacing:.5px">Unidades sueltas</div>'+
                '<input type="number" min="0" id="ldud_'+i+'" value="'+initUd+'" style="'+inpSm+'" onfocus="this.select()"/>'+
              '</div>'+
            '</div>'+
          '</div>';
        }).join('')||'<div class="empty">Sin productos</div>';
        return '<div style="margin-bottom:12px">'+
          '<div style="font-size:11px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">'+
            'Vendedor: <strong style="color:var(--cyan)">'+esc(vnom)+'</strong>'+
          '</div>'+
          '<div class="warn-bar">Puedes ajustar cantidades o quitar productos antes de cargar al inventario.</div>'+
        '</div>'+
        '<div id="ldItems">'+rows+'</div>';
      }

      function buildFoot(){
        return '<button class="btn ghost sm" id="ldCancel">Cancelar</button>'+
               '<button class="btn g sm" id="ldConfirm">📦 Cargar al inventario</button>';
      }

      modal('📋 Preparar pedido — editar si es necesario', buildModalBody(), buildFoot());

      function wireModal(){
        /* qty inputs cj + ud */
        editItems.forEach(function(it,i){
          var inpC=g('ldcj_'+i), inpU=g('ldud_'+i);
          function upd(){
            editItems[i].cj=Math.max(0,parseInt(inpC&&inpC.value)||0);
            editItems[i].ud=Math.max(0,parseInt(inpU&&inpU.value)||0);
            var upc=editItems[i].upc||1;
            editItems[i].cantidad=(editItems[i].cj*upc)+editItems[i].ud;
          }
          if(inpC){inpC.oninput=upd;inpC.onkeydown=function(e){if(e.key==='Enter')inpC.blur();};}
          if(inpU){inpU.oninput=upd;inpU.onkeydown=function(e){if(e.key==='Enter')inpU.blur();};}
        });
        /* delete buttons */
        editItems.forEach(function(it,i){
          var btn=g('lddel_'+i); if(!btn) return;
          btn.onclick=function(){
            editItems.splice(i,1);
            g('mbody').innerHTML=buildModalBody();
            g('mft').innerHTML=buildFoot();
            wireModal();
          };
        });
        g('ldCancel').onclick=closeModal;
        g('ldConfirm').onclick=async function(){
          var active=editItems.filter(function(it){return it.cantidad>0;});
          if(!active.length){toast('No hay productos para cargar','warn');return;}
          g('ldConfirm').disabled=true; g('ldConfirm').textContent='Cargando…';
          /* Lógica de carga:
             - Si hay stock en central: descuenta central y suma al vendedor
             - Si no hay stock en central: suma al vendedor sin tocar central
               (el vendedor consiguió el producto por fuera) */
          for(var j=0;j<active.length;j++){
            var it=active[j];
            var prod=prods.find(function(x){return x.nombre===it.nombre||x.id===it.id;});
            if(!prod)continue;
            /* Descontar de central solo si hay stock suficiente */
            if(prod.stock>0){
              var deducir=Math.min(it.cantidad,prod.stock);
              await db.from('productos').update({stock:prod.stock-deducir}).eq('id',prod.id);
              prod.stock=prod.stock-deducir; /* actualizar local para siguiente iteración */
            }
            /* Sumar a bodega del vendedor siempre */
            var bvR=await db.from('bodega_vendedor').select('id,stock').eq('producto_id',prod.id).eq('vendedor_id',vid).maybeSingle();
            if(bvR.data){
              await db.from('bodega_vendedor').update({stock:bvR.data.stock+it.cantidad}).eq('id',bvR.data.id);
            } else {
              await db.from('bodega_vendedor').insert([{producto_id:prod.id,vendedor_id:vid,empresa_id:S.empresa_id,stock:it.cantidad}]);
            }
            await db.from('transferencias').insert([{producto_id:prod.id,producto_nom:prod.nombre,vendedor_id:vid,vendedor_nom:vnom,admin_id:S.id,empresa_id:S.empresa_id,cantidad:it.cantidad}]);
          }
          await db.from('pedidos').update({estado:'completado'}).eq('id',p.id);
          toast('✓ Inventario de '+vnom+' actualizado','ok');
          closeModal(); adminPedidos(); updateBadge();
        };
      }
      wireModal();
    };
  });
  updateBadge();
}

async function verHistorialAuditorias(){
  g('page').innerHTML='<div class="empty">Cargando historial…</div>';

  var r=await db.from('historial_auditorias')
    .select('id,tipo,quien,faltantes,sobrantes,empresa_nom,reporte_html,created_at')
    .eq('empresa_id',S.empresa_id)
    .order('created_at',{ascending:false})
    .limit(300);

  if(r.error){
    g('page').innerHTML='<div class="panel"><div class="empty" style="padding:24px;color:var(--red)">Error: '+esc(r.error.message)+'</div></div>';
    return;
  }

  var todos=r.data||[];

  function renderHistorial(lista){
    if(!lista.length){
      g('hvBody').innerHTML='<tr><td colspan="6" class="empty" style="padding:24px;text-align:center">Sin auditorías en este filtro.</td></tr>';
      return;
    }
    g('hvBody').innerHTML=lista.map(function(rec){
      var tipo=rec.tipo==='central'?'🏭 Central':'👤 '+esc(rec.quien||'Vendedor');
      var fecha=new Date(rec.created_at).toLocaleString('es',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      var falt=Number(rec.faltantes||0), sob=Number(rec.sobrantes||0);
      var estado=falt===0&&sob===0
        ?'<span class="bd bd-g" style="font-size:10px">✓ OK</span>'
        :'<span class="bd bd-r" style="font-size:10px">'+falt+'F '+sob+'S</span>';
      var btnRep=rec.reporte_html
        ?'<button class="btn sl xs _hvPrint" data-html="'+rec.id+'">🖨</button>'
        :'<span style="font-size:10px;color:var(--txt3)">—</span>';
      return'<tr>'+
        '<td style="font-size:11px;color:var(--txt3);white-space:nowrap">'+fecha+'</td>'+
        '<td>'+tipo+'</td>'+
        '<td style="text-align:center">'+estado+'</td>'+
        '<td style="text-align:center">'+btnRep+'</td>'+
      '</tr>';
    }).join('');

    /* Guardar HTMLs para reimprimir */
    window._hvMap={};
    lista.forEach(function(rec){if(rec.reporte_html) window._hvMap[rec.id]=rec.reporte_html;});

    g('page').querySelectorAll('._hvPrint').forEach(function(btn){
      btn.onclick=function(){
        var html=window._hvMap[btn.dataset.html];
        if(html) bcPrint(html);
      };
    });
  }

  g('page').innerHTML=
    '<div class="panel">'+
      '<div class="ph"><div class="ptitle">📋 Historial de Auditorías</div>'+
        '<span style="font-size:11px;color:var(--txt3)" id="hvCount">'+todos.length+' registros</span>'+
      '</div>'+
      /* Filtros */
      '<div style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)">'+
        '<select id="hvFiltTipo" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none">'+
          '<option value="">Todos</option>'+
          '<option value="vendedor">👤 Vendedor</option>'+
          '<option value="central">🏭 Central</option>'+
        '</select>'+
        '<input type="date" id="hvFiltDesde" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none"/>'+
        '<input type="date" id="hvFiltHasta" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none"/>'+
        '<button class="btn ghost sm" id="hvFiltReset">✕</button>'+
      '</div>'+
      '<div class="twrap"><table>'+
        '<thead><tr>'+
          '<th>Fecha</th><th>Quién</th>'+
          '<th style="text-align:center">Estado</th>'+
          '<th style="text-align:center">Reporte</th>'+
        '</tr></thead>'+
        '<tbody id="hvBody"></tbody>'+
      '</table></div>'+
    '</div>';

  renderHistorial(todos);

  function applyFilters(){
    var tipo=document.getElementById('hvFiltTipo').value;
    var desde=document.getElementById('hvFiltDesde').value;
    var hasta=document.getElementById('hvFiltHasta').value;
    var filtered=todos.filter(function(r){
      if(tipo&&r.tipo!==tipo) return false;
      if(desde&&new Date(r.created_at).toLocaleDateString('en-CA')<desde) return false;
      if(hasta&&new Date(r.created_at).toLocaleDateString('en-CA')>hasta) return false;
      return true;
    });
    var cnt=document.getElementById('hvCount');
    if(cnt) cnt.textContent=filtered.length+' registros';
    renderHistorial(filtered);
  }

  document.getElementById('hvFiltTipo').onchange=applyFilters;
  document.getElementById('hvFiltDesde').oninput=applyFilters;
  document.getElementById('hvFiltHasta').oninput=applyFilters;
  document.getElementById('hvFiltReset').onclick=function(){
    document.getElementById('hvFiltTipo').value='';
    document.getElementById('hvFiltDesde').value='';
    document.getElementById('hvFiltHasta').value='';
    applyFilters();
  };
}

      '<th style="text-align:center;color:var(--green)">Cj<br><span style="font-weight:400;font-size:10px">Físico</span></th>'+
      '<th style="text-align:center;color:var(--green)">Ud<br><span style="font-weight:400;font-size:10px">Físico</span></th>'+

          '<div style="display:flex;gap:10px">'+

          '</div>'+
        '</div>';

        }).join('');

        /* Barra de acciones (oculta al imprimir) */

          '<span style="font-weight:700;font-size:15px;flex:1">Auditoría — '+esc(vNom)+'</span>'+

        '</div>';

        var repHTML='<style>'+
          '.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0f172a}'+
          '.ttl{font-size:22px;font-weight:900;color:#0f172a}.badge{background:#ef4444;color:#fff;padding:6px 14px;border-radius:6px;font-size:18px;font-weight:900}'+
          '.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;padding:14px;background:#f8fafc;border-radius:8px;color:#111}'+
          '.ml{font-size:10px;text-transform:uppercase;color:#94a3b8;font-weight:700;margin-bottom:3px}.mv{font-size:13px;font-weight:600;color:#0f172a}'+
          '._at{width:100%;border-collapse:collapse;margin-bottom:20px}'+
          '._at thead th{background:#0f172a;color:#fff;padding:9px 10px;text-align:center;font-size:11px;text-transform:uppercase}'+
          '._at thead th:first-child{text-align:left}'+
          '._at tbody tr:nth-child(even){background:#f8fafc}._at tbody td{padding:9px 10px;border-bottom:1px solid #e2e8f0;text-align:center;color:#111}'+
          '._at tbody td:first-child{text-align:left}.qty{font-weight:800;color:#ef4444}'+
          '.sig{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:32px}'+
          '.sig-box{border-top:2px solid #1e293b;padding-top:8px;font-size:11px;color:#64748b}'+
          '.ftr{margin-top:20px;font-size:10px;color:#94a3b8;text-align:center;border-top:1px solid #e2e8f0;padding-top:12px}'+
        '</style>'+
        '<div style="padding:32px;background:#fff;color:#111;min-height:100vh">'+
          '<div class="hd">'+
            '<div><div class="ttl">AUDITORÍA — VENDEDOR</div>'+
              '<div style="font-size:12px;color:#64748b;margin-top:4px">'+esc(vNom)+'</div></div>'+
            '<div class="badge">'+faltantes.length+' faltante'+(faltantes.length!==1?'s':'')+'</div>'+
          '</div>'+
          '<div class="meta">'+
            '<div><div class="ml">Empresa</div><div class="mv">'+esc(empD.nombre)+'</div></div>'+
            '<div><div class="ml">Vendedor</div><div class="mv">'+esc(vNom)+'</div></div>'+
            '<div><div class="ml">Fecha</div><div class="mv">'+now+'</div></div>'+
          '</div>'+
          '<table class="_at"><thead><tr>'+
            '<th style="text-align:left">Producto</th>'+
            '<th>Faltante Cajas</th><th>Faltante Unidades</th><th>Motivo</th>'+
          '</tr></thead><tbody>'+repFilas+'</tbody></table>'+
          sobrHTML+
          '<div class="sig">'+
            '<div class="sig-box">Firma del vendedor<br><strong>'+esc(vNom)+'</strong></div>'+
            '<div class="sig-box">Firma supervisión<br>&nbsp;</div>'+
          '</div>'+
          '<div class="ftr">'+esc(empD.nombre)+' · Bridge Control v'+APP_VER+'</div>'+
        '</div>';

        g('page').innerHTML=barHTML+repHTML;
        document.getElementById('_repBack').onclick=function(){adminAuditoria();};
        document.getElementById('_repPrint').onclick=function(){window.print();};
        try{_saveAuditHistory('vendedor', vNom, faltantes.length, sobrantes.length, empD.nombre, now, repHTML);}catch(e){}
      }
    };
  };
}

async function mostrarMovimientos(pid, pNom){
  var overlay=document.createElement('div');
  overlay.id='mvOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;overflow:hidden;';
  overlay.innerHTML=
    '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border2);flex-shrink:0">'+
      '<button id="mvClose" style="background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;line-height:1">←</button>'+
      '<div style="flex:1;font-weight:700;font-size:15px">📈 '+esc(pNom)+'</div>'+
      '<button class="btn sl sm" id="mvPrintBtn">📄 Imprimir</button>'+
    '</div>'+
    '<div style="padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0">'+
      '<select id="mvFiltTipo" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none">'+
        '<option value="">Todos los tipos</option>'+
        '<option value="creacion">🆕 Stock inicial</option>'+
        '<option value="venta">🧾 Ventas</option>'+
        '<option value="transferencia">📤 Transferencias salida</option>'+
        '<option value="devolucion">📥 Devoluciones</option>'+
        '<option value="ajuste">⬇️ Ajustes</option>'+
      '</select>'+
      '<input type="date" id="mvFiltDesde" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none"/>'+
      '<input type="date" id="mvFiltHasta" style="background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:5px 8px;font-size:12px;outline:none"/>'+
      '<button class="btn ghost sm" id="mvFiltReset">✕ Limpiar</button>'+
    '</div>'+
    '<div id="mvKpi" style="display:flex;gap:0;background:var(--s2);border-bottom:1px solid var(--border);flex-shrink:0"></div>'+
    '<div style="flex:1;overflow:auto">'+
      '<table style="width:100%;border-collapse:collapse">'+
        '<thead><tr style="position:sticky;top:0;background:var(--s3);z-index:1">'+
          '<th style="padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2);white-space:nowrap">Fecha</th>'+
          '<th style="padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2)">Tipo</th>'+
          '<th style="padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2)">Quién</th>'+
          '<th style="padding:9px 8px;text-align:right;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2)">Cj</th>'+
          '<th style="padding:9px 8px;text-align:right;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2)">Ud</th>'+
          '<th style="padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--border2)">Detalle</th>'+
        '</tr></thead>'+
        '<tbody id="mvTableBody"></tbody>'+
      '</table>'+
    '</div>'+
    '<div style="padding:10px 14px;background:var(--s2);border-top:1px solid var(--border2);flex-shrink:0">'+
      '<div class="sbox"><span>🔍</span><input id="mvSearch" placeholder="Buscar en movimientos…" style="font-size:13px"/></div>'+
    '</div>';

  document.body.appendChild(overlay);
  var g2=function(id){return document.getElementById(id);};
  g2('mvClose').onclick=function(){document.body.removeChild(overlay);};

  var res=await Promise.all([
    db.from('transferencias')
      .select('cantidad,created_at,vendedor_nom,admin_id')
      .eq('producto_id',pid).eq('empresa_id',S.empresa_id)
      .order('created_at',{ascending:false}).limit(500),
    db.from('ventas')
      .select('numero_factura,cliente,created_at,productos_vendidos,user_id,anulada')
      .eq('empresa_id',S.empresa_id)
      .order('created_at',{ascending:false}).limit(500),
    db.from('ajustes_inventario')
      .select('diferencia,motivo,created_at,admin_id,vendedor_id')
      .eq('producto_id',pid).eq('empresa_id',S.empresa_id)
      .order('created_at',{ascending:false}).limit(300),
    db.from('productos').select('stock,unidades_por_caja,created_at').eq('id',pid).maybeSingle(),
    db.from('entradas_stock')
      .select('cantidad,cantidad_cajas,cantidad_unidades,created_at,costo_unitario,nota,admin_id')
      .eq('producto_id',pid).eq('empresa_id',S.empresa_id)
      .order('created_at',{ascending:false}).limit(200),
  ]);

  var transferencias=res[0].data||[];
  var todasVentas=res[1].data||[];
  var ajustes=res[2].data||[];
  var prodData=res[3].data||{stock:0,unidades_por_caja:1,created_at:null};
  var entradas=res[4].data||[];
  var upc=prodData.unidades_por_caja>0?prodData.unidades_por_caja:1;
  var stockActual=toBoxes(prodData.stock,upc);

  var ventas=[];
  todasVentas.forEach(function(v){
    if(!v.productos_vendidos)return;
    var items=typeof v.productos_vendidos==='string'?JSON.parse(v.productos_vendidos):v.productos_vendidos;
    if(v.anulada) return; /* excluir anuladas */
    var item=items.find(function(i){return i.id===pid||i.producto_id===pid;});
    if(!item)return;
    var cj=Number(item.cantidad_cajas||item.cj||0);
    var ud=Number(item.cantidad_unidades||item.ud||0);
    if(!cj&&!ud){var tot=Number(item.cantidad||0);var b=toBoxes(tot,upc);cj=b.cajas;ud=b.sueltas;}
    var vendNom=v.usuario_nom||v.username||'Admin';
    ventas.push({fecha:v.created_at,folio:v.numero_factura,cliente:v.cliente||'—',
      vendedor:vendNom,cj:cj,ud:ud});
  });

  var allEvts=[];

  /* 1. Stock inicial al crear el producto */
  if(prodData.created_at){
    var initB=toBoxes(prodData.stock,upc);
    allEvts.push({
      fecha:prodData.created_at, tipo:'creacion', ic:'🆕', color:'var(--txt3)',
      desc:'Stock inicial', quien:'Sistema',
      detalle:'Producto registrado en inventario',
      cj:initB.cajas, ud:initB.sueltas, signo:0
    });
  }

  /* 2. Transferencias */
  transferencias.forEach(function(t){
    var qty=Number(t.cantidad||0);
    var esDev=qty<0; /* negativo = devolución */
    var absQty=Math.abs(qty);
    var b=toBoxes(absQty,upc);
    var cj=b.cajas, ud=b.sueltas;
    var adminNom='Admin';
    if(esDev){
      allEvts.push({
        fecha:t.created_at, tipo:'devolucion', ic:'📥', color:'#7c3aed',
        desc:'Devolucion a bodega', quien:adminNom,
        detalle:'De: '+(t.vendedor_nom||'vendedor'),
        cj:cj, ud:ud, signo:1
      });
    } else {
      allEvts.push({
        fecha:t.created_at, tipo:'transferencia', ic:'📤', color:'#d97706',
        desc:'Transferencia a vendedor', quien:adminNom,
        detalle:'A: '+(t.vendedor_nom||'vendedor'),
        cj:cj, ud:ud, signo:-1
      });
    }
  });

  /* 3. Entradas de stock */
  entradas.forEach(function(e){
    var cj=Number(e.cantidad_cajas||0);
    var ud=Number(e.cantidad_unidades||0);
    if(!cj&&!ud){var b=toBoxes(Number(e.cantidad||0),upc);cj=b.cajas;ud=b.sueltas;}
    var nota=e.nota?'Nota: '+e.nota:'';
    allEvts.push({
      fecha:e.created_at, tipo:'entrada', ic:'📥', color:'#16a34a',
      desc:'Entrada de stock', quien:'Admin',
      detalle:nota||'Ingreso de inventario',
      cj:cj, ud:ud, signo:1
    });
  });

  /* 4. Ventas */
  ventas.forEach(function(v){
    var fNum=String(v.folio||'').padStart(4,'0');
    allEvts.push({
      fecha:v.fecha, tipo:'venta', ic:'🧾', color:'#2563eb',
      desc:'Venta #'+fNum, quien:esc(v.vendedor||'Admin'),
      detalle:'Cliente: '+esc(v.cliente||'—'),
      cj:v.cj, ud:v.ud, signo:-1
    });
  });

  /* 4. Ajustes de inventario */
  ajustes.forEach(function(a){
    if(a.motivo&&a.motivo.indexOf('[REPORTE')>=0)return;
    var dif=Number(a.diferencia||0);if(dif===0)return;
    var b=toBoxes(Math.abs(dif),upc);
    var adminNom='Admin';
    /* diferencia = sistema - fisico: positivo = faltante, negativo = sobrante */
    var esFaltante=dif>0;
    allEvts.push({
      fecha:a.created_at, tipo:'ajuste', ic:esFaltante?'⬇️':'⬆️',
      color:esFaltante?'#dc2626':'#059669',
      desc:esFaltante?'Ajuste — faltante':'Ajuste — sobrante',
      quien:adminNom,
      detalle:a.motivo&&a.motivo!=='ajuste'&&a.motivo!=='sobrante'?esc(a.motivo):'Auditoría de inventario',
      cj:b.cajas, ud:b.sueltas, signo:esFaltante?-1:1
    });
  });

  allEvts.sort(function(a,b){return new Date(b.fecha)-new Date(a.fecha);});

  /* KPI totals */
  var totEntCj=0,totEntUd=0,totVentCj=0,totVentUd=0,totTrCj=0,totTrUd=0;
  allEvts.forEach(function(e){
    if(e.tipo==='creacion'||e.tipo==='devolucion'||e.tipo==='ajuste'&&e.signo>0){totEntCj+=e.cj;totEntUd+=e.ud;}
    if(e.tipo==='venta'){totVentCj+=e.cj;totVentUd+=e.ud;}
    if(e.tipo==='transferencia'){totTrCj+=e.cj;totTrUd+=e.ud;}
  });
  var kpiStyle='flex:1;text-align:center;padding:10px 4px;border-right:1px solid var(--border)';
  function kpiCjUd(cj,ud,color){
    return '<div style="font-size:14px;font-weight:900;color:'+color+';font-family:var(--mono);line-height:1.2">'+
      (cj>0?cj+'cj':'')+(cj>0&&ud>0?' ':'')+(ud>0?ud+'u':'')+(cj===0&&ud===0?'0':'')+'</div>';
  }
  var stCj=stockActual.cajas,stUd=stockActual.sueltas;
  g2('mvKpi').innerHTML=
    '<div style="'+kpiStyle+'">'+
      '<div style="font-size:9px;text-transform:uppercase;color:var(--txt3);font-weight:700;margin-bottom:3px">Stock actual</div>'+
      kpiCjUd(stCj,stUd,'var(--cyan)')+
    '</div>'+
    '<div style="'+kpiStyle+'">'+
      '<div style="font-size:9px;text-transform:uppercase;color:var(--txt3);font-weight:700;margin-bottom:3px">Entradas</div>'+
      kpiCjUd(totEntCj,totEntUd,'#16a34a')+
    '</div>'+
    '<div style="'+kpiStyle+'">'+
      '<div style="font-size:9px;text-transform:uppercase;color:var(--txt3);font-weight:700;margin-bottom:3px">Ventas</div>'+
      kpiCjUd(totVentCj,totVentUd,'#2563eb')+
    '</div>'+
    '<div style="'+kpiStyle+'">'+
      '<div style="font-size:9px;text-transform:uppercase;color:var(--txt3);font-weight:700;margin-bottom:3px">Transferencias</div>'+
      kpiCjUd(totTrCj,totTrUd,'#d97706')+
    '</div>'+
    '<div style="'+kpiStyle.replace(';border-right:1px solid var(--border)','')+'">'+
      '<div style="font-size:9px;text-transform:uppercase;color:var(--txt3);font-weight:700;margin-bottom:3px">Total</div>'+
      '<div style="font-size:16px;font-weight:900;color:var(--txt);font-family:var(--mono)">'+allEvts.length+'</div>'+
    '</div>';

  function buildRows(evts){
    if(!evts.length)return'<tr><td colspan="6" class="empty" style="padding:24px;text-align:center">Sin movimientos registrados</td></tr>';
    return evts.map(function(e){
      var d=new Date(e.fecha).toLocaleString('es',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});
      var rowBgMap={
        venta:'rgba(37,99,235,.04)',
        transferencia:'rgba(217,119,6,.04)',
        devolucion:'rgba(124,58,237,.04)',
        ajuste:'rgba(220,38,38,.04)',
        creacion:'rgba(0,0,0,.02)'
      };
      var rowBg=rowBgMap[e.tipo]||'';
      /* Signo visual: + verde / - rojo / neutral */
      var signStr='', signColor='var(--txt3)';
      if(e.signo>0){signStr='+';signColor='#16a34a';}
      else if(e.signo<0){signStr='−';signColor='#dc2626';}
      var cjDisp=e.cj>0?(signStr?'<span style="color:'+signColor+';font-weight:900">'+signStr+'</span>':'')+e.cj:'—';
      var udDisp=e.ud>0?(signStr?'<span style="color:'+signColor+';font-weight:900">'+signStr+'</span>':'')+e.ud:'—';
      return'<tr style="'+rowBg+';border-bottom:1px solid var(--border)">'+
        '<td style="padding:8px 10px;font-size:11px;color:var(--txt3);white-space:nowrap">'+e.ic+' '+d+'</td>'+
        '<td style="padding:8px 10px;font-weight:700;font-size:12px;color:'+e.color+'">'+esc(e.desc)+'</td>'+
        '<td style="padding:8px 10px;font-size:11px;color:var(--txt2);white-space:nowrap">'+esc(e.quien||'—')+'</td>'+
        '<td style="padding:8px 8px;text-align:right;font-family:var(--mono);font-weight:800;font-size:13px">'+cjDisp+'</td>'+
        '<td style="padding:8px 8px;text-align:right;font-family:var(--mono);font-weight:800;font-size:13px">'+udDisp+'</td>'+

      var backup={

        empresa_nombre:S.empresa_nombre,

      var txt=await file.text();
      var bk=JSON.parse(txt);
      if(!bk.version||!bk.productos){toast('Archivo inválido','err');btn.disabled=false;btn.textContent='📤 Cargar archivo backup';return;}
      var eid=S.empresa_id;
      var ok=await ask('Se importaran '+bk.productos.length+' productos, '+bk.ventas.length+' ventas y '+(bk.clientes||[]).length+' clientes. Continuar?');
      if(!ok){btn.disabled=false;btn.textContent='📤 Cargar archivo backup';return;}
      /* Remap empresa_id to current company */
      function remap(arr){return(arr||[]).map(function(r){var n=Object.assign({},r);delete n.id;n.empresa_id=eid;return n;});}
      var errs=0;
      if(bk.productos&&bk.productos.length){var r=await db.from('productos').insert(remap(bk.productos));if(r.error)errs++;}
      if(bk.clientes&&bk.clientes.length){var r=await db.from('clientes').insert(remap(bk.clientes));if(r.error)errs++;}
      if(bk.proveedores&&bk.proveedores.length){var r=await db.from('proveedores').insert(remap(bk.proveedores));if(r.error)errs++;}
      if(bk.ventas&&bk.ventas.length){var r=await db.from('ventas').insert(remap(bk.ventas));if(r.error)errs++;}
      if(bk.pedidos&&bk.pedidos.length){var r=await db.from('pedidos').insert(remap(bk.pedidos));if(r.error)errs++;}
      if(errs>0) toast('Importado con '+errs+' errores — revisa los datos','warn');
      else toast('Backup restaurado correctamente ✓','ok');
    }catch(e){toast('Error al importar: '+e.message,'err');}
    btn.disabled=false; btn.textContent='📤 Cargar archivo backup';
    this.value='';
  };

  /* ── Wire Delete ── */
  g('btnBackupDel').onclick=async function(){

    var ok2=await ask('CONFIRMACION FINAL: Borrar permanentemente todos los productos, ventas, clientes y pedidos?');
    if(!ok2) return;
    var btn=g('btnBackupDel');
    btn.disabled=true; btn.textContent='⏳ Borrando…';
    try{
      var eid=S.empresa_id;
      await Promise.all([
        db.from('bodega_vendedor').delete().eq('empresa_id',eid),
        db.from('ajustes_inventario').delete().eq('empresa_id',eid),
        db.from('transferencias').delete().eq('empresa_id',eid)

      await Promise.all([
        db.from('pedidos').delete().eq('empresa_id',eid),

        db.from('clientes').delete().eq('empresa_id',eid),
        db.from('proveedores').delete().eq('empresa_id',eid)
      ]);
      await db.from('productos').delete().eq('empresa_id',eid);
      toast('✓ Todos los datos eliminados. Empresa lista para empezar de cero.','ok');
      setTimeout(function(){go('db');},1500);
    }catch(e){toast('Error al borrar: '+e.message,'err');}
    btn.disabled=false; btn.textContent='🗑 Borrar todo y empezar de cero';
  };
}

          var cj=Math.max(0,parseInt(inpC&&inpC.value)||0);
          var ud=Math.max(0,parseInt(inpU&&inpU.value)||0);
          orderList[idx].cj=cj;

        if(inpC){inpC.oninput=update;inpC.onkeydown=function(e){if(e.key==='Enter')inpC.blur();};}
        if(inpU){inpU.oninput=update;inpU.onkeydown=function(e){if(e.key==='Enter')inpU.blur();};}
      })(i);
    }

    for(var i=0;i<orderList.length;i++){
      (function(idx){
        var btn=g('vpr_'+idx);
        if(!btn)return;
        btn.onclick=function(){orderList.splice(idx,1);redrawVPed(g('vpQ')?g('vpQ').value:'');};
      })(i);
    }

    /* Wire enviar */
    var envBtn=g('vpEnviar');
    if(envBtn)envBtn.onclick=async function(){
