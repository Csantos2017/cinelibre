      var sinCantidad=orderList.filter(function(o){return (o.cj||0)===0&&(o.ud||0)===0;});
      if(sinCantidad.length){toast('Ingresa cajas o unidades en cada producto','warn');return;}
      envBtn.disabled=true; envBtn.textContent='Enviando…';
      var notas=g('vpNotas')?g('vpNotas').value.trim():'';
      var items=orderList.map(function(o){
        var upc=o.upc||1;
        var totalUds=(o.cj||0)*upc+(o.ud||0);
        return{id:o.id,nombre:o.nombre,upc:upc,cj:o.cj||0,ud:o.ud||0,cantidad:totalUds};
      });
      var pedPayload={vendedor_id:S.id,empresa_id:S.empresa_id,items:items,notas:notas||null,estado:'pendiente'};
      if(_isOnline){
        var r=await db.from('pedidos').insert([pedPayload]);
        if(r.error){toast('Error: '+r.error.message,'err');envBtn.disabled=false;envBtn.textContent='Enviar pedido';return;}
        toast('✓ Pedido enviado al administrador','ok');
      } else {
        idbPush({type:'pedido',payload:pedPayload,ts:Date.now()},function(){updatePendingBadge();});
        toast('📴 Pedido guardado — se enviará al reconectar','warn');
      }
      orderList=[];
      vendedorPedido();
    };
  }

  redrawVPed('');
}

/* ── Box/unit conversion helpers ── */
function toBoxes(qty,upc){
  upc=upc&&upc>0?upc:1;
  return{cajas:Math.floor(qty/upc),sueltas:qty%upc};
}
function fromBoxes(cajas,sueltas,upc){
  upc=upc&&upc>0?upc:1;
  return (parseInt(cajas)||0)*upc+(parseInt(sueltas)||0);
}
function boxLabel(qty,upc){
  upc=upc&&upc>0?upc:1;
  var b=toBoxes(qty,upc);
  if(b.cajas>0&&b.sueltas>0) return b.cajas+'c '+b.sueltas+'u';
  if(b.cajas>0) return b.cajas+'c';
  return b.sueltas+'u';
}

/* ── IDB helpers ── */
var IDB_NAME='bc_offline', IDB_VER=1, IDB_STORE='queue';
function idbOpen(cb){
  var req=indexedDB.open(IDB_NAME,IDB_VER);
  req.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE,{keyPath:'id',autoIncrement:true});};
  req.onsuccess=function(e){cb(e.target.result);};
  req.onerror=function(){cb(null);};
}
function idbPush(op,cb){
  idbOpen(function(db){
    if(!db)return cb&&cb();
    var tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).add(op);
    tx.oncomplete=function(){cb&&cb();};
  });
}
function idbAll(cb){
  idbOpen(function(db){
    if(!db)return cb([]);
    var req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll();
    req.onsuccess=function(){cb(req.result||[]);};
    req.onerror=function(){cb([]);};
  });
}
function idbDel(id,cb){
  idbOpen(function(db){
    if(!db)return cb&&cb();
    var tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete=function(){cb&&cb();};
  });
}

/* ── Sync queue to Supabase ── */
var _syncing=false;
async function syncQueue(){
  if(_syncing||!_isOnline)return;
  _syncing=true;
  idbAll(async function(ops){
    if(!ops.length){_syncing=false;return;}
    var ok=0, err=0;
    for(var j=0;j<ops.length;j++){
      var op=ops[j];
      var res=null;
      try{
        if(op.type==='venta'){
          res=await db.from('ventas').insert([op.payload]);
          if(!res.error){
            /* Descuento de stock en nube */
            for(var k=0;k<op.stockOps.length;k++){
              var so=op.stockOps[k];
              if(so.table==='productos'){
                await db.from('productos').update({stock:so.newStock}).eq('id',so.id);
              } else {
                await db.from('bodega_vendedor').update({stock:so.newStock}).eq('id',so.id);
              }
            }
          }
        } else if(op.type==='pedido'){
          res=await db.from('pedidos').insert([op.payload]);
        } else if(op.type==='stock_update'){
          if(op.table==='productos'){
            res=await db.from('productos').update({stock:op.newStock}).eq('id',op.id);
          } else {
            res=await db.from('bodega_vendedor').update({stock:op.newStock}).eq('id',op.id);
          }
        }
        if(res&&!res.error){ok++;idbDel(op.id);}else{err++;}
      }catch(e){err++;}
    }
    _syncing=false;
    if(ok){
      toast('✓ '+ok+' operación'+(ok>1?'es':'')+' sincronizada'+(ok>1?'s':'')+' con la nube','ok');

      }
    }
    if(err)toast('⚠ '+err+' operación'+(err>1?'es':'')+' pendiente'+(err>1?'s':''),'warn');
  });
}

// ── HELPERS ──────────────────────────────────────────────────
function estBadgeR(est){
  var m={activa:'bd-g',borrador:'bd-o',completada:'bd-m',pendiente:'bd-b'};
  var l={activa:'Activa',borrador:'Borrador',completada:'Completada',pendiente:'Pendiente'};
  return '<span class="bd '+(m[est]||'bd-m')+'">'+esc(l[est]||est)+'</span>';
}
function progresoR(paradas){
  var done=(paradas||[]).filter(function(p){return p.estado==='completada'||p.estado==='saltada';}).length;
  var total=(paradas||[]).length;
  return {done:done, total:total, pct:total?Math.round(done/total*100):0};
}
function distR(a,b){
  var R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function totalKmR(pts){
  var t=0;
  for(var i=0;i<pts.length-1;i++){if(pts[i].lat&&pts[i+1].lat)t+=distR(pts[i],pts[i+1]);}
  return t.toFixed(1);
}
function buildMapUrlR(paradas){
  var pts=paradas.filter(function(p){return p.lat&&p.lng;});
  if(!pts.length)return 'https://maps.google.com';
  if(pts.length===1)return 'https://maps.google.com/?q='+pts[0].lat+','+pts[0].lng;
  return 'https://maps.google.com/dir/'+pts.map(function(p){return p.lat+','+p.lng;}).join('/');
}
function optimizeNNR(points){
  if(!points.length)return[];
  var remaining=points.slice(),ordered=[],cur=remaining.shift();
  ordered.push(cur);
  while(remaining.length){
    var best=null,bestD=Infinity,bestI=-1;
    for(var i=0;i<remaining.length;i++){
      if(!remaining[i].lat)continue;
      var d=distR(cur,remaining[i]);
      if(d<bestD){bestD=d;best=remaining[i];bestI=i;}
    }
    if(bestI<0){ordered.push(remaining.shift());}
    else{ordered.push(remaining.splice(bestI,1)[0]);cur=best;}
  }
  return ordered.map(function(p,i){return Object.assign({},p,{orden:i+1});});
}

function renderLiveMarkersR(){
  if(!_liveMap)return;
  var vends=(cache.vendedores||[]).filter(function(v){return v.gps_lat&&v.gps_lng;});
  var bar=g('lmVendorBar');

  if(!vends.length){
    if(bar)bar.innerHTML='<div style="color:var(--txt3);font-size:12px;padding:4px">Sin vendedores con GPS activo aún</div>';
    return;
  }

  var bounds=[];

  vends.forEach(function(v){
    var lat=v.gps_lat, lng=v.gps_lng;
    var mins=v.gps_updated?Math.round((Date.now()-new Date(v.gps_updated))/60000):null;
    var color=(!mins||mins<5)?'#10b981':(mins<15?'#f59e0b':'#ef4444');
    var statusTxt=mins===null?'Sin GPS':mins<1?'Ahora mismo':mins+'min atrás';

    // Custom icon
    var icon=L.divIcon({
      className:'',
      html:'<div style="background:'+color+';width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 8px '+color+'"></div>',
      iconSize:[16,16],
      iconAnchor:[8,8]
    });

    if(_liveMarkers[v.id]){
      // Update existing marker
      _liveMarkers[v.id].setLatLng([lat,lng]);
      _liveMarkers[v.id].setIcon(icon);
      _liveMarkers[v.id].getPopup().setContent(
        '<strong>'+esc(v.nombre)+'</strong><br>'+
        '<span style="color:'+color+'">⬤</span> '+statusTxt+'<br>'+
        '<small>'+lat.toFixed(5)+', '+lng.toFixed(5)+'</small>'
      );
    } else {
      // Create marker
      var marker=L.marker([lat,lng],{icon:icon})
        .addTo(_liveMap)
        .bindPopup(
          '<strong>'+esc(v.nombre)+'</strong><br>'+
          '<span style="color:'+color+'">⬤</span> '+statusTxt+'<br>'+
          '<small>'+lat.toFixed(5)+', '+lng.toFixed(5)+'</small>'
        );
      _liveMarkers[v.id]=marker;
    }
    bounds.push([lat,lng]);
  });

  // Fit map to show all vendors
  if(bounds.length){
    try{_liveMap.fitBounds(bounds,{padding:[40,40],maxZoom:15});}catch(e){}
  }

  // Update vendor bar
  if(bar){
    bar.innerHTML=vends.map(function(v){
      var mins=v.gps_updated?Math.round((Date.now()-new Date(v.gps_updated))/60000):null;
      var color=(!mins||mins<5)?'#10b981':(mins<15?'#f59e0b':'#ef4444');
      var statusTxt=mins===null?'Sin GPS':mins<1?'Ahora mismo':mins+'min atrás';
      return '<div onclick="focusVendorR(\''+v.id+'\')" style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;flex-shrink:0;min-width:120px">'+
        '<div style="font-size:12px;font-weight:700">'+esc(v.nombre)+'</div>'+
        '<div style="font-size:10px;color:'+color+'">⬤ '+statusTxt+'</div>'+
      '</div>';
    }).join('');
  }
}

function focusVendorR(vid){
  var v=(cache.vendedores||[]).find(function(x){return x.id===vid;});
  if(!v||!v.gps_lat||!_liveMap)return;
  _liveMap.setView([v.gps_lat,v.gps_lng],16);
  if(_liveMarkers[vid])_liveMarkers[vid].openPopup();
}

async function refreshLiveGpsR(){
  if(!S||!S.empresa_id)return;
  var r=await db.from('usuarios')
    .select('id,gps_lat,gps_lng,gps_updated')
    .eq('empresa_id',S.empresa_id)
    .eq('role','vendedor');
  if(!r.error&&r.data){
    r.data.forEach(function(v){
      var idx=(cache.vendedores||[]).findIndex(function(x){return x.id===v.id;});

        cache.vendedores[idx].gps_lng=v.gps_lng;
        cache.vendedores[idx].gps_updated=v.gps_updated;
      }
    });
  }
}

function stopsHtmlR(paradas){
  if(!paradas.length)return '<div class="empty">Sin paradas</div>';
  return '<div style="display:flex;flex-direction:column;gap:0">'+
    paradas.map(function(p,i){
      var clsEst=p.estado==='completada'?' done':p.estado==='saltada'?' skip':p.estado==='activa'?' active':'';
      return '<div class="stop-item'+clsEst+'">'+
        '<div class="stop-line">'+
          '<div class="stop-dot"></div>'+
          (i<paradas.length-1?'<div class="stop-vline"></div>':'')+
        '</div>'+
        '<div class="stop-content">'+
          '<div class="stop-name">'+esc(p.cliente_nom||'—')+'</div>'+
          (p.direccion?'<div class="stop-addr">'+esc(p.direccion)+'</div>':'')+
          '<div class="stop-meta">'+
            (p.hora_estimada?'⏰ '+esc(p.hora_estimada)+' &nbsp;':'')+
            (p.estado==='saltada'&&p.motivo_salto?'↷ '+esc(p.motivo_salto):'')+ 
          '</div>'+
          (p.foto_evidencia?
            '<div style="margin-top:8px">'+
              '<img src="'+p.foto_evidencia+'" '+
                'style="max-width:100%;max-height:160px;border-radius:8px;border:2px solid var(--green);cursor:pointer;object-fit:cover" '+
                'onclick="this.style.maxHeight=this.style.maxHeight===\'none\'?\'160px\':\'none\'" '+
                'title="Foto de evidencia — toca para ampliar"/>'+
            '</div>':'')+ 
        '</div>'+
      '</div>';
    }).join('')+
  '</div>';
}

var _wiz={step:1, nombre:'', vendedor_id:'', vendedor_nom:'', fecha:'', notas:'', clientes:[], paradas:[]};

function wizardStartR(){
  _wiz={step:1,nombre:'',vendedor_id:'',vendedor_nom:'',fecha:new Date().toISOString().slice(0,10),notas:'',clientes:[],paradas:[]};

function wizStepsHtml(active){
  var steps=['Configurar','Clientes','Verificar','Ordenar'];
  return '<div class="wizard-steps">'+steps.map(function(s,i){
    var n=i+1;
    var cls='wstep'+(n===active?' active':n<active?' done':'');
    return '<div class="'+cls+'"><div class="wstep-dot">'+n+'</div><div class="wstep-lbl">'+s+'</div></div>';
  }).join('')+'</div>';
}

function showWizStep1(){
  var vends=cache.vendedores||[];
  modal('Nueva Ruta',

    '<div class="fld"><label>Vendedor *</label>'+
      '<select id="wzV" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--txt);padding:9px;font-size:13px;width:100%;outline:none">'+
        '<option value="">— Seleccionar vendedor —</option>'+
        vends.map(function(v){return'<option value="'+v.id+'" data-nom="'+esc(v.nombre)+'"'+(v.id===_wiz.vendedor_id?' selected':'')+'>'+esc(v.nombre)+'</option>';}).join('')+
      '</select>'+
    '</div>'+
    '<div class="fld"><label>Fecha *</label><input id="wzF" type="date" value="'+_wiz.fecha+'"/></div>'+
    '<div class="fld"><label>Notas</label><input id="wzNt" placeholder="Observaciones opcionales" value="'+esc(_wiz.notas||'')+'"/></div>',
    '<button class="btn ghost sm" onclick="closeModal()">Cancelar</button>'+

  );
  g('wzNext1').onclick=function(){
    var sel=g('wzV');
    _wiz.nombre=g('wzN').value.trim();
    _wiz.vendedor_id=sel.value;
    _wiz.vendedor_nom=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'';

    _wiz.notas=g('wzNt').value.trim();
    if(!_wiz.nombre){toast('Nombre requerido','err');return;}
    if(!_wiz.vendedor_id){toast('Selecciona un vendedor','err');return;}
    if(!_wiz.fecha){toast('Fecha requerida','err');return;}
    showWizStep2();
  };
}

function showWizStep2(){
  var clts=cache.clts||[];
  modal('Nueva Ruta — Clientes',
    wizStepsHtml(2)+
    '<div style="margin-bottom:10px;font-size:12px;color:var(--txt3)">Selecciona los clientes a visitar ('+clts.length+' disponibles)</div>'+
    '<div class="clt-grid" id="cltGrid">'+
      clts.map(function(c){
        var sel=_wiz.clientes.indexOf(c.id)>=0;
        var hasAddr=!!(c.lat&&c.lng)||!!c.direccion;
        return '<div class="clt-card'+(sel?' sel':'')+'" data-cid="'+c.id+'" onclick="toggleCltR(\''+c.id+'\')">'+
          (sel?'<div class="ck">✓</div>':'')+
          (!hasAddr?'<span class="no-addr-badge">⚠ Sin dirección</span>':'')+
          '<div class="clt-name">'+esc(c.nombre)+'</div>'+
          (c.direccion?'<div class="clt-addr">'+esc(c.direccion)+'</div>':'<div class="clt-addr" style="color:var(--txt3)">Sin dirección</div>')+
        '</div>';
      }).join('')+
    '</div>',
    '<button class="btn ghost sm" id="wzBack2">← Atrás</button>'+
    '<button class="btn g sm" id="wzNext2">Siguiente →</button>'
  );
  g('wzBack2').onclick=showWizStep1;
  g('wzNext2').onclick=function(){
    if(!_wiz.clientes.length){toast('Selecciona al menos un cliente','err');return;}
    showWizStep3();
  };
}

function toggleCltR(cid){
  var idx=_wiz.clientes.indexOf(cid);
  if(idx>=0)_wiz.clientes.splice(idx,1);
  else _wiz.clientes.push(cid);
  var card=document.querySelector('.clt-card[data-cid="'+cid+'"]');
  if(card){
    card.classList.toggle('sel',idx<0);
    if(idx<0&&!card.querySelector('.ck')){
      var ck=document.createElement('div');ck.className='ck';ck.textContent='✓';
      card.insertBefore(ck,card.firstChild);
    } else if(idx>=0){
      var ck2=card.querySelector('.ck');if(ck2)ck2.remove();
    }
  }
}

async function showWizStep3(){
  var clts=cache.clts||[];
  var selected=clts.filter(function(c){return _wiz.clientes.indexOf(c.id)>=0;});
  modal('Nueva Ruta — Verificar direcciones',
    wizStepsHtml(3)+
    '<div style="margin-bottom:10px;font-size:12px;color:var(--txt3)">Verificando coordenadas GPS de '+selected.length+' clientes…</div>'+
    '<div id="geoList" style="display:flex;flex-direction:column;gap:6px">'+
      selected.map(function(c){
        return '<div class="geo-item" id="geo_'+c.id+'">'+
          '<div class="geo-icon" id="geoic_'+c.id+'">⏳</div>'+
          '<div>'+
            '<div class="geo-name">'+esc(c.nombre)+'</div>'+
            '<div class="geo-addr" id="geoad_'+c.id+'">'+esc(c.direccion||'Sin dirección')+'</div>'+
          '</div>'+
          '<div class="geo-st" id="geost_'+c.id+'">—</div>'+
        '</div>';
      }).join('')+
    '</div>',
    '<button class="btn ghost sm" id="wzBack3">← Atrás</button>'+
    '<button class="btn g sm" id="wzNext3" disabled>Siguiente →</button>'
  );
  g('wzBack3').onclick=showWizStep2;

  // Geocode each client
  _wiz.paradas = [];
  for(var i=0; i<selected.length; i++){
    var c=selected[i];
    var ic=g('geoic_'+c.id), st=g('geost_'+c.id);
    if(ic)ic.textContent='🔍';
    var lat=c.lat, lng=c.lng;
    if((!lat||!lng)&&c.direccion){
      try{
        var res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(c.direccion)+'&limit=1');
        var data=await res.json();
        if(data&&data.length){lat=parseFloat(data[0].lat);lng=parseFloat(data[0].lon);
          // Save back to DB
          await db.from('clientes').update({lat:lat,lng:lng}).eq('id',c.id);
          var ci=cache.clts.findIndex(function(x){return x.id===c.id;});
          if(ci>=0){cache.clts[ci].lat=lat;cache.clts[ci].lng=lng;}
        }
      }catch(e){}
    }
    _wiz.paradas.push({cliente_id:c.id,cliente_nom:c.nombre,direccion:c.direccion||'',lat:lat||null,lng:lng||null,orden:i+1,estado:'pendiente',hora_estimada:'',notas:'',motivo_salto:''});
    if(ic)ic.textContent=lat?'✅':'⚠';
    if(st)st.textContent=lat?'GPS OK':'Sin coord';
    var row=g('geo_'+c.id);if(row)row.style.borderColor=lat?'var(--green)':'var(--amber)';
    await new Promise(function(res){setTimeout(res,800);});
  }
  var nb=g('wzNext3');if(nb)nb.disabled=false;
  g('wzNext3').onclick=showWizStep4;
}

function showWizStep4(){
  var orig=_wiz.paradas.slice();
  var opt=optimizeNNR(_wiz.paradas.filter(function(p){return p.lat&&p.lng;}));
  // Add any without coords at end
  var noCoord=_wiz.paradas.filter(function(p){return !p.lat||!p.lng;});
  opt=opt.concat(noCoord);

  var kmOrig=totalKmR(orig);
  var kmOpt=totalKmR(opt);
  var savings=Math.max(0,(kmOrig-kmOpt)).toFixed(1);
  var pct=kmOrig>0?Math.round((kmOrig-kmOpt)/kmOrig*100):0;

  function rowsHtml(list){
    return list.map(function(p,i){
      var km=i<list.length-1&&list[i+1].lat?distR(p,list[i+1]).toFixed(1)+'km':'—';
      return '<div class="opt-row"><div class="opt-num">'+(i+1)+'</div>'+
        '<div style="flex:1;font-size:12px">'+esc(p.cliente_nom)+'</div>'+
        '<div class="opt-dist">↓'+km+'</div></div>';
    }).join('');
  }

  modal('Nueva Ruta — Ordenar paradas',
    wizStepsHtml(4)+
    '<div class="opt-compare">'+
      '<div class="opt-col original">'+
        '<div class="opt-col-hd">Tu orden<br><span style="font-size:10px;color:var(--txt3)">'+kmOrig+'km</span></div>'+
        rowsHtml(orig)+
      '</div>'+
      '<div class="opt-col optimized">'+
        '<div class="opt-col-hd">⚡ Optimizado<br><span style="font-size:10px;color:var(--green)">'+kmOpt+'km</span></div>'+
        rowsHtml(opt)+
      '</div>'+
    '</div>'+
    (parseFloat(savings)>0?
      '<div class="savings-bar">⚡ Optimizando ahorras ~'+savings+'km ('+pct+'% menos)</div>':''),
    '<button class="btn ghost sm" id="wzBack4">← Atrás</button>'+
    '<button class="btn sl sm" id="wzUseOrig">Usar original</button>'+
    '<button class="btn g sm" id="wzCreate">✓ Crear ruta</button>'
  );
  g('wzBack4').onclick=showWizStep3;
  g('wzUseOrig').onclick=function(){_wiz.paradas=orig;crearRutaR();};
  g('wzCreate').onclick=function(){_wiz.paradas=opt;crearRutaR();};
}

async function crearRutaR(){
  closeModal();
  var rutaPayload={
    nombre:_wiz.nombre, empresa_id:S.empresa_id, vendedor_id:_wiz.vendedor_id,
    vendedor_nom:_wiz.vendedor_nom, fecha:_wiz.fecha, estado:'borrador',
    notas:_wiz.notas||null, created_by:S.id
  };
  var rr=await db.from('rutas').insert([rutaPayload]);
  if(rr.error){toast('Error creando ruta: '+rr.error.message,'err');return;}
  var rutaData=Array.isArray(rr.data)?rr.data[0]:rr.data;
  if(!rutaData||!rutaData.id){toast('Error: no se obtuvo ID de ruta','err');return;}

  // Insert paradas
  var paradasPayload=_wiz.paradas.map(function(p,i){
    return {ruta_id:rutaData.id,cliente_id:p.cliente_id,cliente_nom:p.cliente_nom,
      direccion:p.direccion||null,lat:p.lat||null,lng:p.lng||null,
      orden:i+1,estado:'pendiente',hora_estimada:p.hora_estimada||null,
      notas:p.notas||null,motivo_salto:null};
  });
  if(paradasPayload.length){
    var pr=await db.from('rutas_paradas').insert(paradasPayload);
    if(pr.error){toast('Ruta creada pero error en paradas: '+pr.error.message,'warn');}
  }
  toast('✓ Ruta "'+_wiz.nombre+'" creada como borrador','ok');
  adminRutas();
}

function vendedorEjecutarRuta(r){
  // Full screen execution view
  var el = g('rutaExecView');
  if(el) el.remove();
  var view = document.createElement('div');
  view.id = 'rutaExecView';
  view.style.cssText = 'position:fixed;inset:0;z-index:1400;background:var(--bg);display:flex;flex-direction:column;overflow:hidden';
  document.body.appendChild(view);
  renderEjecucion(r, 0);
}

function renderEjecucion(r, idx){
  var view = g('rutaExecView');
  if(!view) return;
  var paradas = r.paradas || [];
  // Find first pending stop starting from idx
  var current = null;
  for(var i = idx; i < paradas.length; i++){
    if(paradas[i].estado === 'pendiente'){ current = paradas[i]; idx = i; break; }
  }

  var p = progresoR(paradas);
  var mapUrl = current && current.lat && current.lng
    ? 'https://maps.google.com/?q='+current.lat+','+current.lng
    : (current && current.direccion ? 'https://maps.google.com/?q='+encodeURIComponent(current.direccion) : null);

  view.innerHTML =
    // Header
    '<div style="background:var(--s2);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0">'+
      '<button class="btn ghost sm" id="reBack">← Salir</button>'+
      '<div style="flex:1">'+
        '<div style="font-weight:700;font-size:14px">'+esc(r.nombre)+'</div>'+
        '<div style="font-size:11px;color:var(--txt3)">'+p.done+'/'+p.total+' paradas completadas</div>'+
      '</div>'+
    '</div>'+
    // Progress bar
    '<div style="height:4px;background:var(--s3);flex-shrink:0">'+
      '<div style="height:4px;background:var(--green);width:'+p.pct+'%;transition:width .4s"></div>'+
    '</div>'+
    // Stop list
    '<div style="flex:1;overflow-y:auto;padding:12px">'+
      (paradas.length === 0 ? '<div class="empty">Sin paradas</div>' :
      paradas.map(function(pa, i){
        var isCurrent = pa === current;
        var bg = isCurrent ? 'background:rgba(6,182,212,.08);border-color:var(--cyan)' :
                 pa.estado==='completada' ? 'opacity:.5' :
                 pa.estado==='saltada' ? 'opacity:.4' : '';
        var icon = pa.estado==='completada' ? '✅' : pa.estado==='saltada' ? '⏭' : isCurrent ? '📍' : '⏳';
        return '<div style="display:flex;gap:10px;align-items:flex-start;padding:12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;'+bg+'">'+
          '<div style="font-size:20px;flex-shrink:0;margin-top:2px">'+icon+'</div>'+
          '<div style="flex:1">'+
            '<div style="font-weight:700;font-size:14px">'+esc(pa.cliente_nom||'Sin nombre')+'</div>'+
            (pa.direccion?'<div style="font-size:11px;color:var(--txt3);margin-top:2px">📌 '+esc(pa.direccion)+'</div>':'')+
            (pa.notas?'<div style="font-size:11px;color:var(--amber);margin-top:2px">📝 '+esc(pa.notas)+'</div>':'')+
            (pa.estado==='saltada'&&pa.motivo_salto?'<div style="font-size:11px;color:var(--red);margin-top:2px">↷ '+esc(pa.motivo_salto)+'</div>':'')+
          '</div>'+
          '<div style="font-size:11px;color:var(--txt3);flex-shrink:0">#'+(i+1)+'</div>'+
        '</div>';
      }).join(''))+
    '</div>'+
    // Action buttons for current stop
    (current ?
    '<div style="padding:12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--s2)">'+
      '<div style="font-size:12px;color:var(--txt3);margin-bottom:8px;text-align:center">Parada actual: <strong style="color:var(--txt)">'+esc(current.cliente_nom)+'</strong></div>'+
      '<div style="display:flex;gap:8px">'+
        (mapUrl ? '<a href="'+mapUrl+'" target="_blank" class="btn sl sm" style="flex:1;text-align:center;text-decoration:none">🗺 Navegar</a>' : '')+
        '<button class="btn r sm" id="reSaltar" style="flex:1">↷ Saltar</button>'+
        '<button class="btn g sm" id="reCompletar" style="flex:1">✓ Completar</button>'+
      '</div>'+
    '</div>'
    :
    '<div style="padding:16px;text-align:center;border-top:1px solid var(--border);flex-shrink:0;background:var(--s2)">'+
      '<div style="font-size:32px;margin-bottom:8px">🎉</div>'+
      '<div style="font-weight:700;color:var(--green);margin-bottom:12px">¡Todas las paradas completadas!</div>'+
      '<button class="btn g sm" id="reTerminar">✓ Finalizar ruta</button>'+
    '</div>');

  // Wire buttons
  g('reBack').onclick = function(){
    var el=g('rutaExecView'); if(el)el.remove();
  };

  if(current){
    g('reCompletar').onclick = function(){ completarParada(r, current, idx); };
    g('reSaltar').onclick    = function(){ saltarParada(r, current, idx); };
  }

  var term = g('reTerminar');
  if(term) term.onclick = async function(){
    await db.from('rutas').update({estado:'completada'}).eq('id', r.id);
    toast('¡Ruta completada! 🎉','ok');
    var el=g('rutaExecView'); if(el)el.remove();
    vendedorRutas();
  };
}

async function completarParada(r, parada, idx){
  /* If foto_paradas is enabled, show camera modal first */
  if(S.foto_paradas){
    _fotoParadaCallback = async function(fotoData){
      var payload={estado:'completada',completada_at:new Date().toISOString()};
      if(fotoData)payload.foto_evidencia=fotoData;
      var res=await db.from('rutas_paradas').update(payload).eq('id',parada.id);
      if(res.error){toast('Error: '+res.error.message,'err');return;}
      parada.estado='completada';
      if(fotoData)parada.foto_evidencia=fotoData;
      toast('✓ Parada completada','ok');
      renderEjecucion(r,idx+1);
    };
    openFotoParada();
    return;
  }
  var res = await db.from('rutas_paradas').update({
    estado:'completada',
    completada_at: new Date().toISOString()
  }).eq('id', parada.id);
  if(res.error){ toast('Error: '+res.error.message,'err'); return; }
  parada.estado = 'completada';
  toast('✓ Parada completada','ok');
  renderEjecucion(r, idx+1);
}

    '<canvas id="fotoCanvas" style="display:none"></canvas>'+
    '<img id="fotoPreview" style="display:none;width:100%;max-width:360px;border-radius:12px;border:2px solid var(--green)"/>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">'+
      '<button class="btn ghost sm" id="fotoSkip">Omitir foto</button>'+
      '<button class="btn sl sm" id="fotoCapture">📷 Tomar foto</button>'+
      '<button class="btn g sm" id="fotoConfirm" style="display:none">✓ Usar esta foto</button>'+
      '<button class="btn r sm" id="fotoRetake" style="display:none">↺ Repetir</button>'+
    '</div>';
  document.body.appendChild(ov);

  var stream=null;
  var captured=null;

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(s){
      stream=s;
      g('fotoVideo').srcObject=s;
    })
    .catch(function(){
      toast('No se pudo acceder a la cámara','warn');
    });

  function stopStream(){if(stream)stream.getTracks().forEach(function(t){t.stop()});stream=null;}

  g('fotoSkip').onclick=function(){
    stopStream();ov.remove();
    if(_fotoParadaCallback){_fotoParadaCallback(null);_fotoParadaCallback=null;}
  };

  g('fotoCapture').onclick=function(){
    var video=g('fotoVideo');
    var canvas=g('fotoCanvas');
    canvas.width=video.videoWidth||640;
    canvas.height=video.videoHeight||480;
    canvas.getContext('2d').drawImage(video,0,0);
    captured=canvas.toDataURL('image/jpeg',0.7);
    g('fotoPreview').src=captured;
    g('fotoPreview').style.display='block';
    g('fotoVideo').style.display='none';
    g('fotoCapture').style.display='none';
    g('fotoConfirm').style.display='inline-flex';
    g('fotoRetake').style.display='inline-flex';
  };

  g('fotoRetake').onclick=function(){
    captured=null;
    g('fotoPreview').style.display='none';
    g('fotoVideo').style.display='block';
    g('fotoCapture').style.display='inline-flex';
    g('fotoConfirm').style.display='none';
    g('fotoRetake').style.display='none';
  };

  g('fotoConfirm').onclick=function(){
    stopStream();ov.remove();
    if(_fotoParadaCallback){_fotoParadaCallback(captured);_fotoParadaCallback=null;}
  };
}

function saltarParada(r, parada, idx){
  var motivos = [
    'Cliente cerrado temporalmente',
    'Me indicaron que no pasara',
    'Cliente fuera de la zona',
    'Problema de acceso',
    'Cliente solicitó postponer',
    'Otro'
  ];
  modal('↷ Motivo para saltar',
    '<div style="display:flex;flex-direction:column;gap:8px">'+
      motivos.map(function(m,i){
        return '<label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer">'+
          '<input type="radio" name="motivo" value="'+esc(m)+'" style="accent-color:var(--cyan)"'+(i===0?' checked':'')+'>'+
          '<span style="font-size:13px">'+esc(m)+'</span>'+
          '</label>';
      }).join('')+
      '<input id="motivoOtro" placeholder="Detalle (opcional)" style="background:var(--s2);border:1.5px solid var(--border2);border-radius:8px;color:var(--txt);padding:9px 12px;font-size:13px;width:100%;outline:none"/>'+
    '</div>',
    '<button class="btn ghost sm" id="skipCancel">Cancelar</button>'+
    '<button class="btn r sm" id="skipOk">↷ Confirmar salto</button>'
  );
  g('skipCancel').onclick = closeModal;
  g('skipOk').onclick = async function(){
    var sel = document.querySelector('input[name="motivo"]:checked');
    var motivo = sel ? sel.value : 'Sin motivo';
    if(motivo==='Otro'){
      var det = g('motivoOtro').value.trim();
      if(det) motivo = det;
    } else {
      var det2 = g('motivoOtro').value.trim();
      if(det2) motivo = motivo + ': ' + det2;
    }
    var res = await db.from('rutas_paradas').update({
      estado:'saltada',
      motivo_salto: motivo
    }).eq('id', parada.id);
    if(res.error){ toast('Error: '+res.error.message,'err'); return; }
    parada.estado = 'saltada';
    parada.motivo_salto = motivo;
    closeModal();
    toast('Parada saltada','inf');
    renderEjecucion(r, idx+1);
  };
}

// ── GPS PUBLISH (vendedor) ────────────────────────────────────
async function startGpsPublish(){
  if(!navigator.geolocation||!S||(S.role!=='vendedor'&&S.role!=='v_inv'))return;
  /* Only publish GPS if empresa has Elite plan */
  var _planGps=await db.from('empresas').select('plan').eq('id',S.empresa_id).maybeSingle();
  if((_planGps.data&&_planGps.data.plan)!=='elite')return;
  setInterval(function(){
    navigator.geolocation.getCurrentPosition(function(pos){
      db.from('usuarios').update({
        gps_lat:pos.coords.latitude,
        gps_lng:pos.coords.longitude,
        gps_updated:new Date().toISOString()
      }).eq('id',S.id);
    },null,{enableHighAccuracy:true,timeout:10000});
  },30000);
}


// ── BARCODE SCANNER ──────────────────────────────────────────
var _scanReader = null;
var _scanActive = false;

function openScanner() {
  var modal = g('scanModal');
  if (!modal) return;
  if (typeof ZXingBrowser === 'undefined') {
    toast('Librería de escáner cargando, intenta en un momento…', 'warn');
    return;
  }
  modal.classList.add('open');
  g('scanResult').style.display = 'none';
  _scanActive = true;
  _scanReader = new ZXingBrowser.BrowserMultiFormatReader();
  _scanReader.decodeFromVideoDevice(null, 'scanVideo', function(result, err) {
    if (!_scanActive) return;
    if (result) {
      var code = result.getText();
      closeScanner();
      onBarcodeScanned(code);
    }
  });
  g('scanClose').onclick = closeScanner;
}

function closeScanner() {
  _scanActive = false;
  if (_scanReader) { try { _scanReader.reset(); } catch(e) {} _scanReader = null; }
  var modal = g('scanModal');
  if (modal) modal.classList.remove('open');
}

function onBarcodeScanned(code) {
  if (!code) return;
  var prods = cache.prods || [];
  var match = prods.find(function(p) {
    return p.codigo_barras && p.codigo_barras.trim() === code.trim();
  });
  var posQ = g('posQ');
  if (match) {
    if (posQ) { posQ.value = match.nombre; renderPOSCat(match.nombre, '_all'); }
    toast('✓ ' + match.nombre, 'ok');
  } else {
    if (posQ) { posQ.value = code; renderPOSCat(code, '_all'); }
    toast('Código: ' + code + ' — no encontrado en productos', 'warn');
  }
}

document.addEventListener('click', function(e) {
  if (e.target && e.target.id === 'btnScan') openScanner();
});

// ── SCANNER PARA CAMPOS DE FORMULARIO ────────────────────────
var _scanTargetField = null;

function openScannerForField(fieldId) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast('Tu navegador no soporta acceso a la cámara', 'err'); return;
  }
  _scanTargetField = fieldId;
  var modal = g('scanModal');
  if (!modal) return;
  modal.classList.add('open');
  _scanActive = true;

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(stream) {
      _scanStream = stream;
      var video = g('scanVideo');
      video.srcObject = stream;
      video.play();
      if ('BarcodeDetector' in window) {
        _scanDetector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code','itf']});
        _scanInterval = setInterval(function() {
          if (!_scanActive) return;
          _scanDetector.detect(video).then(function(codes) {
            if (codes && codes.length > 0) {
              var code = codes[0].rawValue;
              closeScanner();
              var field = g(_scanTargetField);
              if (field) {
                field.value = code;
                field.style.borderColor = 'var(--green)';
                setTimeout(function(){ field.style.borderColor = ''; }, 2000);
                toast('✓ Código capturado: ' + code, 'ok');
              }
              _scanTargetField = null;
            }
          }).catch(function(){});
        }, 300);
      } else {
        closeScanner();
        var code = prompt('Escribe el código manualmente:');
        if (code) {
          var field = g(_scanTargetField);
          if (field) { field.value = code; toast('✓ Código ingresado', 'ok'); }
        }
        _scanTargetField = null;
      }
    })
    .catch(function(err) {
      closeScanner();
      _scanTargetField = null;
      toast('No se pudo acceder a la cámara: ' + err.message, 'err');
    });

  g('scanClose').onclick = function() {
    _scanTargetField = null;
    closeScanner();
  };
}
